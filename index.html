<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salma Rahba – Rounding System</title>
<meta name="description" content="Hospital Rounding System – Salma Rahba Rehabilitation Medicine"/>
<meta name="theme-color" content="#7b1f2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rounding"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --deep:#7b1f2e;--mid:#9b2335;--lite:#b83245;
  --bg:#fdf4f5;--pale:#fdf0f1;--border:#f0cdd1;--soft:#fad5d9;--sidebar:#fdf7f7;
  --td:#2d1417;--tm:#3d1e22;--mu:#9b6670;--fa:#b08088;
  --font:'DM Sans',sans-serif;--disp:'DM Serif Display',serif;
  --sh:0 2px 10px rgba(120,30,40,0.07);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--td);}
button{font-family:var(--font);cursor:pointer;}
input,select,textarea{font-family:var(--font);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#e8c0c5;border-radius:10px;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#7b1f2e 0%,#9b2335 50%,#b83245 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;border-radius:20px;padding:36px 36px 32px;width:min(400px,94vw);box-shadow:0 24px 64px rgba(0,0,0,0.2);}
.login-logo{text-align:center;margin-bottom:20px;}
.login-logo .icon{font-size:42px;margin-bottom:12px;}
.login-logo h1{font-family:var(--disp);font-size:21px;color:var(--deep);line-height:1.3;}
.login-logo p{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:0.08em;margin-top:5px;}
.auth-tabs{display:flex;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1.5px solid #edcacf;}
.auth-tab{flex:1;padding:9px;border:none;background:#fdf8f8;font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;transition:all 0.15s;}
.auth-tab:first-child{border-right:1px solid #edcacf;}
.auth-tab.active{background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.lf input{width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid #edcacf;font-size:14px;color:var(--td);outline:none;background:#fdf8f8;}
.lf input:focus{border-color:var(--mid);box-shadow:0 0 0 3px rgba(155,35,53,0.12);}
.login-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;font-size:14px;font-weight:700;margin-top:6px;letter-spacing:0.03em;}
.login-btn:hover{opacity:0.9;}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;}
.login-err{font-size:12px;color:#dc2626;text-align:center;margin-top:10px;min-height:16px;}
.login-ok{font-size:12px;color:#16a34a;text-align:center;margin-top:10px;min-height:16px;}
.login-note{font-size:11px;color:var(--mu);text-align:center;margin-top:10px;line-height:1.6;}

/* APP */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden;}
#header{background:linear-gradient(135deg,var(--deep) 0%,var(--mid) 60%,var(--lite) 100%);height:58px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;box-shadow:0 2px 12px rgba(123,31,46,0.22);}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.hdr-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:18px;}
.hdr-title{font-family:var(--disp);font-size:14px;color:#fff;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,0.65);letter-spacing:0.08em;text-transform:uppercase;}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hdr-btn{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.12);color:#fff;font-size:12px;font-weight:600;transition:opacity 0.15s;}
.hdr-btn:hover{opacity:0.8;}
.hdr-date{font-size:12px;color:rgba(255,255,255,0.75);}
.hdr-user{font-size:12px;color:rgba(255,255,255,0.85);font-weight:600;}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;cursor:pointer;}
.hdr-avatar:hover{background:rgba(255,255,255,0.32);}
#body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:300px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:14px 14px 10px;}
.sidebar-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sidebar-lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.09em;}
.btn-add{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;}
.search-input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #edcacf;background:#fff;font-size:12px;color:var(--tm);outline:none;}
.search-input:focus{border-color:var(--mid);}
#patient-list{overflow-y:auto;flex:1;padding-bottom:10px;}
.empty-list{padding:24px 14px;text-align:center;color:var(--fa);font-size:13px;}
.sidebar-foot{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--mu);background:var(--sidebar);}

/* WARD SECTIONS */
.ward-section{border-bottom:1px solid var(--border);}
.ward-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;background:var(--sidebar);border:none;width:100%;text-align:left;transition:background 0.12s;}
.ward-hdr:hover{background:#fae8ea;}
.ward-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ward-name{font-size:12px;font-weight:700;color:var(--td);flex:1;}
.ward-cnt{font-size:10px;font-weight:700;color:var(--mu);background:#f5d5d8;border-radius:20px;padding:1px 7px;}
.ward-chev{font-size:10px;color:var(--fa);}
.ward-pats{display:block;}.ward-pats.collapsed{display:none;}
.pri-section{border-bottom:2px solid #f5b8c0;}
.pri-hdr{background:linear-gradient(90deg,#fdf0f1,#fdf7f7)!important;}
.pri-hdr:hover{background:#fae8ea!important;}
.urg-section{border-bottom:2px solid #fca5a5;}
.urg-hdr{background:linear-gradient(90deg,#fff1f1,#fdf7f7)!important;}
.urg-hdr:hover{background:#fee2e2!important;}
.unst-section{border-bottom:2px solid #fcd34d;}
.unst-hdr{background:linear-gradient(90deg,#fffbeb,#fdf7f7)!important;}
.unst-hdr:hover{background:#fef3c7!important;}
.urg-badge{font-size:11px;font-weight:700;background:#dc2626;color:#fff;border-radius:6px;padding:2px 8px;}
.pri-badge{font-size:11px;font-weight:700;background:#fee2e2;color:#dc2626;border-radius:6px;padding:2px 8px;}
.ptoggle{width:100%;padding:8px 11px;border-radius:8px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid #edcacf;background:#fdf8f8;color:#b08088;cursor:pointer;transition:all 0.15s;}
.ptoggle.on{border-color:#dc2626;background:#fee2e2;color:#dc2626;}
.utoggle{width:100%;padding:8px 11px;border-radius:8px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid #edcacf;background:#fdf8f8;color:#b08088;cursor:pointer;transition:all 0.15s;}
.utoggle.on{border-color:#dc2626;background:#dc2626;color:#fff;}

/* PATIENT ROWS */
.pat-row{padding:11px 14px;border-left:3px solid transparent;cursor:pointer;border-bottom:1px solid #f0e4e6;background:#fff;transition:background 0.12s;position:relative;}
.pat-row:nth-child(even){background:#fdf4f5;}
.pat-row:hover{background:#fae8ea;}
.pat-row:nth-child(even):hover{background:#fae8ea;}
.pat-row.active{background:var(--soft)!important;border-left-color:var(--mid)!important;}
.row-top{display:flex;justify-content:space-between;align-items:flex-start;}
.row-room{font-size:11px;font-weight:700;color:var(--mid);background:var(--soft);border-radius:5px;padding:1px 6px;}
.row-name{font-weight:600;font-size:13px;color:var(--td);margin-top:5px;}
.row-mrn{font-size:11px;color:#b08088;margin-top:2px;}
.row-bot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.row-pt{font-size:11px;color:var(--mu);}
.row-done{font-size:10px;color:var(--fa);}.row-done.complete{color:#16a34a;}
.row-acts{position:absolute;bottom:8px;right:10px;display:none;gap:5px;}
.pat-row:hover .row-acts{display:flex;}
.re-btn{padding:3px 9px;border-radius:6px;border:1px solid #edcacf;background:#fdf0f1;color:var(--mid);font-size:11px;font-weight:600;}
.re-btn:hover{background:#f7d5d8;}
.ra-btn{padding:3px 9px;border-radius:6px;border:1px solid #fecaca;background:#fff5f5;color:#dc2626;font-size:11px;font-weight:600;}
.ra-btn:hover{background:#fee2e2;}
.rd-btn{padding:3px 8px;border-radius:6px;border:1px solid #fca5a5;background:#dc2626;color:#fff;font-size:11px;font-weight:700;}
.rd-btn:hover{background:#b91c1c;}

/* BADGES */
.cls-badge{font-size:10px;font-weight:600;border-radius:5px;padding:2px 7px;}
.cls-ABM{background:#fad5d9;color:#7b1f2e;}.cls-LC{background:#dcfce7;color:#166534;}
.cls-LTC{background:#fef9c3;color:#854d0e;}.cls-SSR{background:#fce7f3;color:#9d174d;}
.cls-PAR{background:#ede9fe;color:#5b21b6;}
.ward-dot-warda{background:#7b1f2e;}.ward-dot-wardb{background:#10b981;}
.ward-dot-icu1{background:#f59e0b;}.ward-dot-icu2{background:#ef4444;}
.wbadge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.wbadge-warda{background:#fad5d9;color:#7b1f2e;}.wbadge-wardb{background:#d1fae5;color:#065f46;}
.wbadge-icu1{background:#fef3c7;color:#92400e;}.wbadge-icu2{background:#fee2e2;color:#991b1b;}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:20px 24px;}
.empty-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}

/* PATIENT CARD */
.pat-card{background:#fff;border-radius:14px;padding:18px 22px;border:1px solid #f5d5d8;box-shadow:var(--sh);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.pat-card-l{display:flex;align-items:center;gap:16px;}
.pat-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#f5b8c0,#ee9aaa);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--deep);flex-shrink:0;}
.pat-fullname{font-family:var(--disp);font-size:22px;color:var(--td);}
.pat-meta{display:flex;gap:14px;margin-top:3px;flex-wrap:wrap;}
.pat-meta span{font-size:12px;color:var(--mu);}
.pat-card-r{display:flex;align-items:center;gap:10px;}
.edit-pat-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1.5px solid #edcacf;background:#fdf0f1;color:var(--mid);font-size:12px;font-weight:600;}
.edit-pat-btn:hover{background:#f7d5d8;}

/* CHECKLIST */
.chk-card{background:#fff;border-radius:14px;border:1px solid #f5d5d8;box-shadow:var(--sh);margin-bottom:18px;overflow:hidden;}
.card-hdr{padding:12px 20px;background:linear-gradient(90deg,#fdf0f1,#fdf8f8);border-bottom:1px solid #f5d5d8;display:flex;align-items:center;gap:8px;}
.card-hdr-lbl{font-weight:700;font-size:13px;color:#7b1f2e;letter-spacing:0.03em;}
.chk-items{display:flex;gap:14px;padding:16px 20px;flex-wrap:wrap;}
.chk-divider{display:flex;align-items:center;gap:10px;padding:8px 20px;background:linear-gradient(90deg,#fdf0f1,#fdf8f8);border-top:1px solid #f0cdd1;border-bottom:1px solid #f0cdd1;font-size:12px;font-weight:700;color:#7b1f2e;letter-spacing:0.04em;}
.chk-btn{flex:1;min-width:140px;padding:14px 16px;border-radius:12px;border:2px solid #f5d5d8;background:#fdf8f8;text-align:left;display:flex;align-items:center;gap:12px;transition:all 0.15s;}
.chk-btn:hover{transform:scale(1.02);}
.chk-box{width:28px;height:28px;border-radius:8px;background:#f5d5d8;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:background 0.15s;flex-shrink:0;}
.chk-lbl{font-weight:600;font-size:13px;color:#64748b;}
.chk-sub{font-size:10px;color:var(--fa);margin-top:1px;}
.eq-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;border:1.5px solid #edcacf;background:#fdf8f8;cursor:pointer;font-family:var(--font);transition:all 0.15s;}
.eq-btn:hover{background:#faeaec;border-color:#d4929c;}
.eq-btn.checked{border-color:#9b2335;background:linear-gradient(135deg,#fad5d9,#fff8f8);}
.eq-icon{font-size:16px;}.eq-lbl{font-size:12px;font-weight:600;color:#3d1e22;}
.eq-btn.checked .eq-lbl{color:#7b1f2e;}
.eq-chk{font-size:11px;font-weight:700;color:#9b2335;background:#fad5d9;border-radius:20px;padding:1px 7px;margin-left:2px;}
.eq-other{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid #edcacf;outline:none;font-size:13px;color:#3d1e22;background:#fdf8f8;font-family:var(--font);}
.eq-other:focus{border-color:#9b2335;}
.eq-others-saved{background:#fdf8f8;border:1.5px solid #edcacf;border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.eq-others-text{font-size:13px;color:#3d1e22;flex:1;}
.eq-others-acts{display:flex;gap:6px;flex-shrink:0;}
.eq-others-edit{display:flex;flex-direction:column;}

/* NOTES */
.notes-wrap{display:flex;flex-direction:column;gap:14px;}
.note-card{background:#fff;border-radius:12px;border:1px solid #f5d5d8;overflow:hidden;box-shadow:0 1px 4px rgba(123,31,46,0.06);}
.note-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;background:linear-gradient(90deg,#fdf0f1,#fdf8f8);border-bottom:1px solid #f5d5d8;}
.note-hdr-lbl{font-weight:600;font-size:13px;color:#7b1f2e;letter-spacing:0.03em;}
.note-cnt{margin-left:auto;font-size:11px;color:var(--mu);background:#fae8ea;border-radius:20px;padding:2px 9px;}
.note-input-area{padding:12px 16px 0;}
.note-ta{width:100%;min-height:80px;padding:10px 12px;border-radius:8px;border:1.5px solid #edcacf;outline:none;resize:vertical;font-size:13px;color:var(--tm);background:#fdf8f8;line-height:1.7;transition:border-color 0.15s;}
.note-ta:focus{border-color:var(--mid);box-shadow:0 0 0 3px rgba(155,35,53,0.12);}
.note-save-row{display:flex;justify-content:flex-end;padding:8px 16px 12px;}
.note-save-btn{padding:6px 18px;border-radius:8px;border:none;background:#edcacf;color:#fff;font-size:12px;font-weight:700;letter-spacing:0.03em;transition:background 0.15s;}
.note-save-btn.active{background:linear-gradient(135deg,var(--deep),var(--mid));cursor:pointer;}
.note-hist{border-top:1px solid #fae8ea;}
.note-hist-lbl{padding:8px 16px 4px;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.07em;}
.note-entry{border-top:1px solid #fdf0f1;}
.note-entry-hdr{display:flex;align-items:center;gap:8px;padding:9px 16px;}
.note-entry-hdr:hover{background:#fdf8f8;}
.note-ts{font-size:11px;color:var(--lite);font-weight:600;flex:1;cursor:pointer;line-height:1.5;}
.note-ts .etag{color:var(--fa);font-weight:400;font-size:10px;display:block;margin-top:1px;}
.note-author{font-size:10px;color:var(--mu);background:#fdf0f1;border-radius:10px;padding:1px 7px;white-space:nowrap;}
.note-acts{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ne-btn{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid transparent;}
.ne-view{border-color:#edcacf;background:#fdf0f1;color:var(--mid);}.ne-view:hover{background:#f7d5d8;}
.ne-edit{border-color:#edcacf;background:#fdf0f1;color:var(--mid);}.ne-edit:hover{background:#f7d5d8;}
.ne-del{border-color:#fecaca;background:#fff5f5;color:#dc2626;}.ne-del:hover{background:#fee2e2;}
.ne-rep{border-color:#edcacf;background:#fdf0f1;color:#7b1f2e;}.ne-rep:hover{background:#f7d5d8;}
.note-body{padding:10px 16px 14px;font-size:13px;color:var(--tm);line-height:1.7;white-space:pre-wrap;background:#fdf8f8;border-top:1px dashed #f5d5d8;display:none;}
.note-body.open{display:block;}
.note-edit-area{padding:10px 16px 14px;background:#fdf0f1;border-top:1px solid #f5b8c0;display:none;}
.note-edit-area.open{display:block;}
.note-edit-ta{width:100%;min-height:90px;padding:10px 12px;border-radius:8px;border:1.5px solid #ee9aaa;outline:none;resize:vertical;font-size:13px;color:var(--tm);background:#fff;line-height:1.7;font-family:var(--font);}
.note-edit-ta:focus{border-color:var(--mid);}
.note-edit-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:8px;}
.ne-cancel{padding:5px 14px;border-radius:7px;border:1.5px solid #edcacf;background:#fff;color:var(--mu);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);}
.ne-cancel:hover{background:#fdf0f1;}
.ne-save{padding:5px 16px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}
.ne-save:hover{opacity:0.9;}
.del-confirm{padding:10px 16px 14px;background:#fff5f5;border-top:1px solid #fecaca;display:none;align-items:center;justify-content:space-between;gap:12px;}
.del-confirm.open{display:flex;}
.del-msg{font-size:12px;color:#dc2626;font-weight:600;}
.del-acts{display:flex;gap:7px;flex-shrink:0;}
.dc-cancel{padding:4px 12px;border-radius:6px;border:1px solid #edcacf;background:#fff;color:var(--mu);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);}
.dc-cancel:hover{background:#fdf0f1;}
.dc-confirm{padding:4px 12px;border-radius:6px;border:none;background:#dc2626;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}
.dc-confirm:hover{background:#b91c1c;}
.reply-thread{background:#fdf7f7;border-top:1px solid #f0cdd1;padding:0 16px 8px 32px;}
.reply-entry{padding:8px 0 6px;border-bottom:1px dashed #f0cdd1;}
.reply-entry:last-child{border-bottom:none;}
.reply-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.reply-ts{font-size:10px;color:#b83245;font-weight:600;flex:1;}
.reply-author{font-size:10px;color:var(--mu);background:#fdf0f1;border-radius:10px;padding:1px 6px;}
.reply-del{font-size:10px;padding:1px 7px;border-radius:5px;border:1px solid #fecaca;background:#fff5f5;color:#dc2626;cursor:pointer;font-weight:600;font-family:var(--font);}
.reply-del:hover{background:#fee2e2;}
.reply-text{font-size:12px;color:#3d1e22;line-height:1.65;white-space:pre-wrap;}
.reply-input{display:none;background:#fdf0f1;border-top:1px solid #f5d5d8;padding:10px 16px 12px 32px;}
.reply-input.open{display:block;}
.reply-ta{width:100%;min-height:60px;padding:8px 10px;border-radius:8px;border:1.5px solid #edcacf;outline:none;resize:vertical;font-size:12px;color:#3d1e22;background:#fff;line-height:1.6;font-family:var(--font);}
.reply-ta:focus{border-color:#9b2335;}
.reply-acts{display:flex;justify-content:flex-end;gap:7px;margin-top:7px;}

<script>
// ═══════════════════════════════════════

// ═══════════════════════════════════════
const { createClient } = supabase;
const db = createClient(

);

// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
const CLSS = ["ABM","LC","LTC","SSR","PAR"];
const WARDS = [
  {id:"Ward A",label:"Ward A",dc:"ward-dot-warda",bc:"wbadge-warda"},
  {id:"Ward B",label:"Ward B",dc:"ward-dot-wardb",bc:"wbadge-wardb"},

];
const DEF_CHK = {stable:false,unstable:false,bariatricWheelchair:false,comfortWheelchair:false,highframeWalker:false,hoist:false,medicalBed:false,sling:false,standardWalker:false,standardWheelchair:false,wheeledWalker:false};

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let S = { patients:[], archive:[], selected:null, search:"" };
let currentUser=null, currentName="", currentRole="pending";
const isAdmin        = ()=>currentRole==="admin";
const canManagePatients = ()=>["admin","admin_officer"].includes(currentRole);
const canDeletePatients = ()=>currentRole==="admin";
const canManageUsers    = ()=>currentRole==="admin";
const canWriteNotes     = ()=>["admin","admin_officer","user"].includes(currentRole);
const collapsed = new Set(["__urg__","__pri__","__unst__","Ward A","Ward B","ICU 1","ICU 2"]);

function initCollapsed(){
  collapsed.clear();
  collapsed.add("__urg__");
  collapsed.add("__pri__");
  collapsed.add("__unst__");
  WARDS.forEach(w=>collapsed.add(w.id));
}

function expandPatientGroup(pid){
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  if(p.isUrgent){collapsed.delete("__urg__");return;}
  if(p.highPriority){collapsed.delete("__pri__");return;}
  if(p.checklist?.unstable){collapsed.delete("__unst__");return;}
  collapsed.delete(p.ward||"Ward A");
}

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const fmt=iso=>{if(!iso)return"—";try{return new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true});}catch{return"—";}};
const wkey=w=>w.toLowerCase().replace(/\s+/g,"");
const wbc=w=>`wbadge wbadge-${wkey(w||"Ward A")}`;

// ── PRIVACY MODE ──────────────────────────────────────────────
let privacyMode=false;
function maskName(name){
  if(!privacyMode||!name)return name||"";
  const parts=name.trim().split(/\s+/);
  if(parts.length===1)return parts[0]; // single word — show as-is
  // Show first name only, mask the rest with •••
  return parts[0]+" "+"•".repeat(Math.max(3,parts.slice(1).join(" ").length));
}
function maskMRN(mrn){
  if(!privacyMode||!mrn)return mrn||"";
  const s=String(mrn);
  if(s.length<=2)return s;
  return "•".repeat(s.length-2)+s.slice(-2);
}
function togPrivacy(){
  privacyMode=!privacyMode;
  const btn=document.getElementById("hdr-privacy-btn");
  if(btn){
    btn.textContent=privacyMode?"🔒 Privacy":"🔓 Privacy";
    btn.style.background=privacyMode?"rgba(220,38,38,0.35)":"rgba(255,255,255,0.12)";
    btn.style.borderColor=privacyMode?"rgba(220,38,38,0.7)":"rgba(255,255,255,0.35)";
  }
  renderSidebar();renderMain();
  toast(privacyMode?"🔒 Privacy mode ON — names & MRNs masked":"🔓 Privacy mode OFF","#475569");
}
let _tt;
function toast(msg,color="#9b2335"){const e=document.getElementById("toast");e.textContent=msg;e.style.background=color;e.style.display="block";clearTimeout(_tt);_tt=setTimeout(()=>e.style.display="none",3500);}
function loader(msg){document.getElementById("loader-msg").textContent=msg||"Loading…";document.getElementById("loader").classList.add("visible");}
function noloader(){document.getElementById("loader").classList.remove("visible");}
function getSel(){return S.patients.find(p=>p.id===S.selected);}

// ═══════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════
function switchAuthTab(tab){
  document.getElementById("panel-signin").style.display=tab==="signin"?"block":"none";
  document.getElementById("panel-register").style.display=tab==="register"?"block":"none";
  document.getElementById("tab-signin").className="auth-tab"+(tab==="signin"?" active":"");
  document.getElementById("tab-register").className="auth-tab"+(tab==="register"?" active":"");
  document.getElementById("login-err").textContent="";
  document.getElementById("register-err").textContent="";
  document.getElementById("register-ok").textContent="";
  // Clear register fields when switching to sign-in to avoid confusion
  if(tab==="signin"){
    ["rn","re","rp","rp2"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  }
}

async function doLogin(){
  const email=document.getElementById("le").value.trim();
  const pass=document.getElementById("lp").value;
  const err=document.getElementById("login-err");
  const btn=document.getElementById("login-btn");
  err.textContent="";
  if(!email||!pass){err.textContent="Please enter email and password.";return;}
  btn.disabled=true;btn.textContent="Signing in…";
  try{
    const {data,error}=await db.auth.signInWithPassword({email,password:pass});
    btn.disabled=false;btn.textContent="Sign In";
    if(error){err.textContent=error.message;return;}
    await onLogin(data.user);
  }catch(e){
    btn.disabled=false;btn.textContent="Sign In";
    err.textContent="Unexpected error: "+e.message;
  }
}

async function doRegister(){
  const name=document.getElementById("rn").value.trim();
  const email=document.getElementById("re").value.trim();
  const pass=document.getElementById("rp").value;
  const pass2=document.getElementById("rp2").value;
  const err=document.getElementById("register-err");
  const ok=document.getElementById("register-ok");
  const btn=document.getElementById("register-btn");
  err.textContent="";ok.textContent="";
  if(!name||!email||!pass||!pass2){err.textContent="Please fill in all fields.";return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent="Please enter a valid email address.";return;}
  if(pass.length<6){err.textContent="Password must be at least 6 characters.";return;}
  if(pass!==pass2){err.textContent="Passwords do not match.";return;}
  btn.disabled=true;btn.textContent="Creating account…";
  try{
    const {data,error}=await db.auth.signUp({
      email,password:pass,
      options:{data:{full_name:name}}
    });
    btn.disabled=false;btn.textContent="Create Account";
    if(error){err.textContent=error.message;return;}
    if(!data?.user){err.textContent="Something went wrong. Please try again.";return;}
    // Insert as 'pending' — must be approved by admin before they can access the app
    await db.from("user_roles").upsert(
      {user_id:data.user.id,role:"pending",full_name:name},
      {onConflict:"user_id"}
    );
    ["rn","re","rp","rp2"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    ok.textContent="✅ Account created! Your account is pending admin approval. You'll be able to sign in once approved.";
  }catch(e){
    btn.disabled=false;btn.textContent="Create Account";
    err.textContent="Unexpected error: "+e.message;
  }
}
async function onLogin(user){
  currentUser=user;
  currentName=user.user_metadata?.full_name||user.email.split("@")[0];

  // Fetch role — use error to distinguish "no row" from "RLS/network failure"
  const {data:roleRow,error:roleErr}=await db.from("user_roles").select("role,full_name").eq("user_id",user.id).maybeSingle();

  if(roleRow){
    // Row found — use it
    currentRole=roleRow.role||"pending";
    if(roleRow.full_name)currentName=roleRow.full_name;
  }else if(roleErr){
    // Query failed (RLS or network) — don't assume pending, show error
    await db.auth.signOut();
    const err=document.getElementById("login-err");
    if(err)err.textContent="Could not verify your account. Please try again. ("+roleErr.message+")";
    const btn=document.getElementById("login-btn");
    if(btn){btn.disabled=false;btn.textContent="Sign In";}
    return;
  }else{
    // Truly no row exists — this is a brand new user, insert as pending
    const {error:insertErr}=await db.from("user_roles").insert(
      {user_id:user.id,role:"pending",full_name:currentName}
    );
    if(insertErr){
      // Insert also failed — likely RLS; don't block, just warn
      console.warn("Could not create role row:",insertErr.message);
    }
    currentRole="pending";
  }

  // Block pending users
  if(currentRole==="pending"){
    await db.auth.signOut();
    const err=document.getElementById("login-err");
    if(err)err.textContent="⏳ Your account is pending admin approval. Please wait for approval before signing in.";
    const btn=document.getElementById("login-btn");
    if(btn){btn.disabled=false;btn.textContent="Sign In";}
    return;
  }

  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="flex";
  const av=document.getElementById("hdr-av");
  av.textContent=currentName.slice(0,2).toUpperCase();
  av.title=`Signed in as ${user.email} — click to sign out`;
  document.getElementById("hdr-user").textContent=currentName;

  // Show/hide header buttons based on role
  const adminBtn=document.getElementById("hdr-admin-btn");
  const addBtn=document.getElementById("btn-add-patient");
  if(adminBtn)adminBtn.style.display=canManageUsers()?"":"none";
  if(addBtn)addBtn.style.display=canManagePatients()?"":"none";

  // Role badge
  const roleBadge=document.getElementById("hdr-role-badge");
  if(roleBadge){
    const badgeMap={
      "admin":       {label:"👑 Admin",        bg:"#fbbf24",color:"#1e1e1e"},
      "admin_officer":{label:"🔷 Admin Officer",bg:"#a78bfa",color:"#1e1e1e"},
      "user":        {label:"👤 User",          bg:"rgba(255,255,255,0.2)",color:"#fff"},
    };
    const b=badgeMap[currentRole]||{label:currentRole,bg:"rgba(255,255,255,0.15)",color:"#fff"};
    roleBadge.textContent=b.label;
    roleBadge.style.background=b.bg;
    roleBadge.style.color=b.color;
  }

  loader("Loading patients…");
  await loadAll();
  noloader();
  render();
}
async function doLogout(){
  if(!confirm("Sign out?"))return;
  await db.auth.signOut();location.reload();
}
(async()=>{
  try{
    const {data}=await db.auth.getSession();
    if(data?.session?.user)await onLogin(data.session.user);
  }catch(e){
    console.error("Session restore error:",e);
  }
})();

// ═══════════════════════════════════════
//  DB LOAD
// ═══════════════════════════════════════
async function loadAll(){
  const [pR,nR,rR]=await Promise.all([
    db.from("patients").select("*").order("created_at"),
    db.from("notes").select("*").order("created_at"),
    db.from("replies").select("*").order("created_at"),
  ]);
  const repMap={};
  (rR.data||[]).forEach(r=>{if(!repMap[r.note_id])repMap[r.note_id]=[];repMap[r.note_id].push(r2l(r));});
  const noteMap={};
  (nR.data||[]).forEach(n=>{const k=n.patient_id+"_"+n.note_type;if(!noteMap[k])noteMap[k]=[];noteMap[k].push(n2l(n,repMap[n.id]||[]));});
  S.patients=[];S.archive=[];
  (pR.data||[]).forEach(p=>{
    const lp=p2l(p,noteMap);
    if(p.is_archived)S.archive.push({...lp,archivedAt:p.archived_at});
    else S.patients.push(lp);
  });
  // Reset selected if it no longer exists in the active list
  const ids=S.patients.map(p=>p.id);
  if(!S.selected||!ids.includes(S.selected)){
    S.selected=S.patients.length?S.patients[0].id:null;
  }
  // Collapse all groups on every load
  initCollapsed();
}
const p2l=(p,nm)=>({
  id:p.id,room:p.room,name:p.name,mrn:p.mrn,
  primaryPt:p.primary_pt||"",primaryOt:p.primary_ot||"",primarySlp:p.primary_slp||"",
  classification:p.classification||"ABM",highPriority:p.high_priority||false,isUrgent:p.is_urgent||false,
  ward:p.ward||"Ward A",checklist:{...DEF_CHK,...(p.checklist||{})},equipOthers:p.equip_others||"",
  physicianNotes:"",roundNotes:"",ptNotes:"",otNotes:"",slpNotes:"",
  physicianHistory:nm[p.id+"_physician"]||[],roundHistory:nm[p.id+"_round"]||[],
  ptHistory:nm[p.id+"_pt"]||[],otHistory:nm[p.id+"_ot"]||[],slpHistory:nm[p.id+"_slp"]||[],
});
const n2l=(n,replies)=>({id:n.id,text:n.text,ts:n.created_at,authorName:n.author_name||"",editedAt:n.edited_at,replies});
const r2l=r=>({id:r.id,text:r.text,ts:r.created_at,authorName:r.author_name||""});
function updL(id,changes){S.patients=S.patients.map(p=>p.id===id?{...p,...changes}:p);}

function selPat(id){S.selected=id;expandPatientGroup(id);renderSidebar();renderMain();}
function onSearch(v){S.search=v;renderSidebar();}
function togWard(id){if(collapsed.has(id))collapsed.delete(id);else collapsed.add(id);renderSidebar();}

async function togChk(pid,key){
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  const nc={...p.checklist,[key]:!p.checklist[key]};
  updL(pid,{checklist:nc});
  if(key==="unstable"){
    if(nc.unstable){
      // Turned ON — expand
      collapsed.delete("__unst__");
    } else {
      // Turned OFF — collapse if no others remain
      const stillUnstable=S.patients.filter(x=>x.id!==pid).some(x=>x.checklist?.unstable);
      if(!stillUnstable)collapsed.add("__unst__");
    }
  }
  renderMain();renderSidebar();
  const {error}=await db.from("patients").update({checklist:nc,updated_at:new Date().toISOString()}).eq("id",pid);
  if(error){
    const rollback={...p.checklist};
    updL(pid,{checklist:rollback});renderMain();renderSidebar();
    toast("Failed to update checklist: "+error.message,"#dc2626");
  }
}

async function togFlag(pid,flag){
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  const isPriority=flag==="priority";
  const newVal=isPriority?!p.highPriority:!p.isUrgent;
  const dbField=isPriority?"high_priority":"is_urgent";
  const localField=isPriority?"highPriority":"isUrgent";
  const groupKey=isPriority?"__pri__":"__urg__";
  updL(pid,{[localField]:newVal});
  if(newVal){
    // Flag turned ON — expand its group
    collapsed.delete(groupKey);
  } else {
    // Flag turned OFF — check if that group is now empty; if so collapse it
    const updated=S.patients.find(x=>x.id===pid);
    const stillInGroup=S.patients.filter(x=>x.id!==pid).some(x=>isPriority?x.highPriority:x.isUrgent);
    if(!stillInGroup)collapsed.add(groupKey);
  }
  renderMain();renderSidebar();
  const {error}=await db.from("patients").update({[dbField]:newVal,updated_at:new Date().toISOString()}).eq("id",pid);
  if(error){
    updL(pid,{[localField]:!newVal});renderMain();renderSidebar();
    toast("Failed to update flag: "+error.message,"#dc2626");
  }
}
async function commitEqO(pid){
  const input=document.getElementById("eq-o-"+pid);
  if(!input)return;
  const val=input.value.trim();
  const {error}=await db.from("patients").update({equip_others:val,updated_at:new Date().toISOString()}).eq("id",pid);
  if(error){toast("Failed to save: "+error.message,"#dc2626");return;}
  updL(pid,{equipOthers:val});
  renderMain();
  toast("Others saved ✓","#16a34a");
}

  document.getElementById("eq-edit-"+pid).style.display="flex";

function cancelEqEdit(pid){
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  document.getElementById("eq-edit-"+pid).style.display="none";
  document.getElementById("eq-saved-"+pid).style.display="flex";
  const input=document.getElementById("eq-o-"+pid);
  if(input)input.value=p.equipOthers||"";
}
async function deleteEqO(pid){
  const {error}=await db.from("patients").update({equip_others:"",updated_at:new Date().toISOString()}).eq("id",pid);
  if(error){toast("Failed to delete: "+error.message,"#dc2626");return;}
  updL(pid,{equipOthers:""});
  renderMain();

}
function onNI(pid,field,el){
  updL(pid,{[field]:el.value});
  const type=field.replace("Notes","");
  const btn=document.getElementById(`nsb-${type}-${pid}`);
  if(btn)btn.className="note-save-btn"+(el.value.trim().length>0?" active":"");
}

async function saveNote(pid,draftF,histF){
  const p=S.patients.find(x=>x.id===pid);if(!p||!p[draftF]?.trim())return;
  loader("Saving note…");
  const type=draftF.replace("Notes","");
  const {data:nd,error}=await db.from("notes").insert({patient_id:pid,note_type:type,text:p[draftF].trim(),author_name:currentName,author_id:currentUser?.id}).select().single();
  noloader();if(error){toast("Failed to save note.","#dc2626");return;}
  const saved=n2l(nd,[]);
  const changes={[histF]:[...(p[histF]||[]),saved],[draftF]:""};
  let flagRemoved=false;
  const tracked=["physicianHistory","roundHistory","ptHistory","otHistory","slpHistory"];
  if(tracked.includes(histF)){
    const removedFlags=[];
    if(p.highPriority){changes.highPriority=false;await db.from("patients").update({high_priority:false,updated_at:new Date().toISOString()}).eq("id",pid);removedFlags.push("🚩 Priority");}
    if(p.isUrgent){changes.isUrgent=false;await db.from("patients").update({is_urgent:false,updated_at:new Date().toISOString()}).eq("id",pid);removedFlags.push("🔴 Urgent");}
    if(removedFlags.length>0){flagRemoved=true;toast(`${removedFlags.join(" & ")} flag${removedFlags.length>1?"s":""} removed — note saved.`,"#9b2335");}
  }
  updL(pid,changes);renderMain();renderSidebar();
  if(!flagRemoved)toast("Note saved ✓","#16a34a");
}

// note view/edit/delete
function togView(id){
  const b=document.getElementById("nb-"+id),v=document.getElementById("vbtn-"+id),e=document.getElementById("ea-"+id),d=document.getElementById("dc-"+id);
  if(e?.classList.contains("open")||d?.classList.contains("open"))return;
  const o=b.classList.toggle("open");if(v)v.textContent=o?"▲ Hide":"▼ View";
}
function closeExtras(ex){
  document.querySelectorAll(".note-edit-area.open").forEach(e=>{if(!ex||e.id!=="ea-"+ex)e.classList.remove("open");});
  document.querySelectorAll(".del-confirm.open").forEach(e=>{if(!ex||e.id!=="dc-"+ex)e.classList.remove("open");});
  document.querySelectorAll(".reply-input.open").forEach(e=>{if(!ex||e.id!=="ri-"+ex)e.classList.remove("open");});
}
function togEdit(pid,hk,nid){
  closeExtras(nid);
  const b=document.getElementById("nb-"+nid),v=document.getElementById("vbtn-"+nid),e=document.getElementById("ea-"+nid);
  if(!e)return;const o=e.classList.toggle("open");
  if(o){if(b)b.classList.remove("open");if(v)v.textContent="▼ View";const ta=document.getElementById("eta-"+nid);if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}}
}
function cancelEdit(pid,hk,nid){
  document.getElementById("ea-"+nid)?.classList.remove("open");
  const p=S.patients.find(x=>x.id===pid);if(p){const n=(p[hk]||[]).find(x=>x.id===nid);if(n){const ta=document.getElementById("eta-"+nid);if(ta)ta.value=n.text;}}
}
async function commitEdit(pid,hk,nid){
  const ta=document.getElementById("eta-"+nid);if(!ta)return;
  const t=ta.value.trim();if(!t){toast("Note cannot be empty.","#dc2626");return;}
  loader("Updating note…");
  const {error}=await db.from("notes").update({text:t,edited_at:new Date().toISOString()}).eq("id",nid);
  noloader();
  if(error){toast("Failed to update note: "+error.message,"#dc2626");return;}
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  updL(pid,{[hk]:(p[hk]||[]).map(n=>n.id===nid?{...n,text:t,editedAt:new Date().toISOString()}:n)});
  renderMain();toast("Note updated ✓","#16a34a");
}
function promptDel(pid,hk,nid){
  closeExtras(nid);const b=document.getElementById("nb-"+nid),v=document.getElementById("vbtn-"+nid);
  if(b)b.classList.remove("open");if(v)v.textContent="▼ View";
  document.getElementById("dc-"+nid)?.classList.add("open");
}
function cancelDel(nid){document.getElementById("dc-"+nid)?.classList.remove("open");}
async function commitDel(pid,hk,nid){
  loader("Deleting note…");
  const {error}=await db.from("notes").delete().eq("id",nid);
  noloader();
  if(error){toast("Failed to delete note: "+error.message,"#dc2626");return;}
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  updL(pid,{[hk]:(p[hk]||[]).filter(n=>n.id!==nid)});
  renderMain();toast("Note deleted.","#64748b");
}

// replies

function cancelReply(nid){

async function postReply(pid,hk,nid){
  const ta=document.getElementById("rta-"+nid);if(!ta)return;
  const t=ta.value.trim();if(!t){toast("Reply cannot be empty.","#dc2626");return;}
  loader("Posting reply…");
  const {data,error}=await db.from("replies").insert({note_id:nid,text:t,author_name:currentName,author_id:currentUser?.id}).select().single();
  noloader();if(error){toast("Failed to post reply.","#dc2626");return;}
  const rep=r2l(data);
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  updL(pid,{[hk]:(p[hk]||[]).map(n=>n.id===nid?{...n,replies:[...(n.replies||[]),rep]}:n)});
  renderMain();toast("Reply posted ✓","#16a34a");

async function delReply(pid,hk,nid,rid){
  loader("Removing reply…");
  const {error}=await db.from("replies").delete().eq("id",rid);
  noloader();
  if(error){toast("Failed to remove reply: "+error.message,"#dc2626");return;}
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  updL(pid,{[hk]:(p[hk]||[]).map(n=>n.id===nid?{...n,replies:(n.replies||[]).filter(r=>r.id!==rid)}:n)});
  renderMain();toast("Reply removed.","#64748b");
}

    <div class="g2">

    <div><label class="fl">Primary SLP</label><input class="fi" id="fslp" value="${esc(v.primarySlp||"")}" placeholder="e.g. Dr. Patel"/></div>
    <div class="g2">
      <div><label class="fl">Ward</label><select class="fi" id="fw">${wOpts}</select></div>
      <div><label class="fl">Classification</label><select class="fi" id="fc">${opts}</select></div>
    </div>
    <div class="g2">
      <div><label class="fl">Priority</label>
        <button class="ptoggle${v.highPriority?" on":""}" id="fpb" onclick="togP()">🚩 <span id="fpl">${v.highPriority?"Priority":"Normal"}</span></button>
        <input type="hidden" id="fp" value="${v.highPriority?1:0}"/>
      </div>
      <div><label class="fl">Urgent</label>

    </div>

      <button class="btn-cancel" onclick="closeModal()">Cancel</button>

function togP(){const i=document.getElementById("fp"),b=document.getElementById("fpb"),l=document.getElementById("fpl");const o=i.value==="1";i.value=o?"0":"1";b.className="ptoggle"+(o?"":" on");l.textContent=o?"Normal":"Priority";}
function togU(){const i=document.getElementById("fu"),b=document.getElementById("fub"),l=document.getElementById("ful");const o=i.value==="1";i.value=o?"0":"1";b.className="utoggle"+(o?"":" on");l.textContent=o?"Normal":"Urgent";}

async function subPat(eid){
  const room=document.getElementById("fr").value.trim(),mrn=document.getElementById("fm").value.trim(),name=document.getElementById("fn").value.trim();
  const primaryPt=document.getElementById("fpt").value.trim(),primaryOt=document.getElementById("fot").value.trim(),primarySlp=document.getElementById("fslp").value.trim();
  const cls=document.getElementById("fc").value,ward=document.getElementById("fw").value;
  const hp=document.getElementById("fp").value==="1",isUrgent=document.getElementById("fu").value==="1";
  if(!room){toast("Room number is required.","#dc2626");return;}
  // eid is passed as a string from onclick — convert "null" string to actual null
  const editId=(eid===null||eid==="null")?null:eid;
  loader(editId?"Saving…":"Adding…");
  if(editId){
    const {error}=await db.from("patients").update({room,mrn,name,primary_pt:primaryPt,primary_ot:primaryOt,primary_slp:primarySlp,classification:cls,high_priority:hp,is_urgent:isUrgent,ward,updated_at:new Date().toISOString()}).eq("id",editId);
    noloader();if(error){toast("Failed: "+error.message,"#dc2626");return;}
    updL(editId,{room,mrn,name,primaryPt,primaryOt,primarySlp,classification:cls,highPriority:hp,isUrgent,ward});
    closeModal();render();toast("Patient updated ✓","#16a34a");
  }else{
    const {data,error}=await db.from("patients").insert({room,mrn,name,primary_pt:primaryPt,primary_ot:primaryOt,primary_slp:primarySlp,classification:cls,high_priority:hp,is_urgent:isUrgent,ward,checklist:DEF_CHK,equip_others:""}).select().single();
    noloader();if(error){toast("Failed: "+error.message,"#dc2626");return;}
    S.patients.push(p2l(data,{}));S.selected=data.id;
    expandPatientGroup(data.id);
    closeModal();render();toast("Patient added ✓","#16a34a");
  }
}

function openArcConfirm(id){
  if(!canManagePatients()){toast("You don't have permission to archive patients.","#dc2626");return;}
  const p=S.patients.find(x=>x.id===id);if(!p)return;
  const label=p.name||"Room "+p.room;
  showModal(`<div class="confirm-box"><div class="conf-icon">🗄️</div><div class="conf-title">Archive Patient?</div><div class="conf-msg"><strong>${esc(label)}</strong> (Room ${esc(p.room)}) will be moved to the archive.</div><div class="conf-sub">Restore later by name or MRN.</div><div class="modal-acts" style="width:100%"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-danger" onclick="arcPat('${id}')">Archive</button></div></div>`);
}
async function arcPat(id){
  const p=S.patients.find(x=>x.id===id);if(!p)return;
  loader("Archiving…");
  const {error}=await db.from("patients").update({is_archived:true,archived_at:new Date().toISOString()}).eq("id",id);
  noloader();
  if(error){toast("Failed to archive: "+error.message,"#dc2626");return;}
  S.archive.push({...p,archivedAt:new Date().toISOString()});
  S.patients=S.patients.filter(x=>x.id!==id);
  S.selected=S.patients.length?S.patients[0].id:null;
  closeModal();render();toast(`${p.name||"Room "+p.room} archived.`,"#7c3aed");
}

function openDelConfirm(id){
  if(!canDeletePatients()){toast("Only admins can permanently delete patients.","#dc2626");return;}
  const p=S.patients.find(x=>x.id===id);if(!p)return;
  const label=p.name||"Room "+p.room;
  showModal(`<div class="confirm-box"><div class="conf-icon">🗑️</div><div class="conf-title">Delete Patient?</div><div class="conf-msg"><strong>${esc(label)}</strong> will be <strong>permanently deleted</strong>.</div><div class="conf-sub">Cannot be undone. All notes and history will be lost.</div><div class="modal-acts" style="width:100%"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-danger" onclick="permDel('${id}')">Delete Permanently</button></div></div>`);
}
async function permDel(id){
  const p=S.patients.find(x=>x.id===id);if(!p)return;
  loader("Deleting…");
  const {error}=await db.from("patients").delete().eq("id",id);
  noloader();
  if(error){toast("Failed to delete: "+error.message,"#dc2626");return;}
  S.patients=S.patients.filter(x=>x.id!==id);
  if(S.selected===id)S.selected=S.patients.length?S.patients[0].id:null;
  closeModal();render();toast(`${p.name||"Room "+p.room} permanently deleted.`,"#dc2626");
}

function openArchiveModal(){renderArcModal("");}
function renderArcModal(q){
  const res=S.archive.filter(p=>(p.name||"").toLowerCase().includes(q.toLowerCase())||(p.mrn||"").toLowerCase().includes(q.toLowerCase()));
  const rows=res.length===0?`<div class="arc-empty">${S.archive.length===0?"No archived patients yet.":"No matches found."}</div>`
    :res.map(p=>`<div class="arc-row"><div><div class="arc-name">${esc(maskName(p.name||"Room "+p.room))}</div><div class="arc-meta">${esc(maskMRN(p.mrn))} · Room ${esc(p.room)} · PT: ${esc(p.primaryPt||"—")}</div><div class="arc-ts">Archived ${p.archivedAt?fmt(p.archivedAt):""}</div></div>${canManagePatients()?`<button class="btn-restore" onclick="restorePat('${p.id}')">Restore</button>`:""}</div>`).join("");
  showModal(`<div class="modal-head"><span class="modal-title">🗄️ Patient Archive</span><button class="modal-close" onclick="closeModal()">×</button></div><div class="arc-search"><input class="fi" autofocus placeholder="Search by name or MRN…" value="${esc(q)}" oninput="renderArcModal(this.value)" style="font-size:14px"/></div><div class="arc-list modal-body scroll" style="padding:0">${rows}</div>`,false,true);
}
async function restorePat(id){
  if(!canManagePatients()){toast("You don't have permission to restore patients.","#dc2626");return;}
  loader("Restoring…");
  const {error}=await db.from("patients").update({is_archived:false,archived_at:null}).eq("id",id);
  noloader();
  if(error){toast("Failed to restore: "+error.message,"#dc2626");return;}
  const p=S.archive.find(x=>x.id===id);if(!p)return;
  const {archivedAt,...patient}=p;
  S.patients.push(patient);S.archive=S.archive.filter(x=>x.id!==id);
  S.selected=patient.id;
  closeModal();render();toast(`${patient.name||"Room "+patient.room} restored ✓`,"#16a34a");
}

//  ADMIN USER MANAGEMENT
// ═══════════════════════════════════════
const ROLE_LABELS={"pending":"⏳ Pending","user":"👤 User","admin_officer":"🔷 Admin Officer","admin":"👑 Admin"};
const ROLE_PILLS={"pending":"rp-pending","user":"rp-user","admin_officer":"rp-admin_officer","admin":"rp-admin"};

async function openAdminPanel(){
  if(!isAdmin()){toast("Admin access only.","#dc2626");return;}
  loader("Loading users…");
  const {data:users,error}=await db.from("user_roles").select("*").order("created_at");
  noloader();
  if(error){toast("Failed to load users: "+error.message,"#dc2626");return;}

  const all=(users||[]).slice().sort((a,b)=>{
    const order={pending:0,user:1,admin_officer:2,admin:3};
    return (order[a.role]??9)-(order[b.role]??9);
  });
  const pending=all.filter(u=>u.role==="pending");
  const fmtDate=iso=>{if(!iso)return"—";return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};

  const pendingBanner=pending.length>0
    ?`<div class="pending-banner">⏳ <strong>${pending.length} user${pending.length!==1?"s":""} waiting for approval</strong></div>`:"";

  const rows=all.map(u=>{
    const isMe=u.user_id===currentUser?.id;
    const role=u.role||"pending";
    const pill=`<span class="role-pill ${ROLE_PILLS[role]||"rp-pending"}">${ROLE_LABELS[role]||role}</span>`;
    let actions="";
    if(isMe){
      actions=`<span style="font-size:11px;color:var(--mu);font-style:italic">You</span>`;
    }else if(role==="pending"){
      actions=`
        <button class="ua-btn ua-approve" onclick="changeRole('${u.user_id}','user')">✅ Approve</button>
        <button class="ua-btn ua-reject" onclick="rejectUser('${u.user_id}','${esc(u.full_name||"this user")}')">✕ Reject</button>`;
    }else if(role==="user"){
      actions=`
        <button class="ua-btn ua-promote" onclick="changeRole('${u.user_id}','admin_officer')">→ Admin Officer</button>
        <button class="ua-btn ua-promote" style="border-color:#f59e0b;background:#fffbeb;color:#92400e" onclick="changeRole('${u.user_id}','admin')">→ Admin</button>`;
    }else if(role==="admin_officer"){
      actions=`
        <button class="ua-btn ua-promote" style="border-color:#f59e0b;background:#fffbeb;color:#92400e" onclick="changeRole('${u.user_id}','admin')">→ Admin</button>
        <button class="ua-btn ua-demote" onclick="changeRole('${u.user_id}','user')">→ User</button>`;
    }else if(role==="admin"){
      actions=`
        <button class="ua-btn ua-demote" onclick="changeRole('${u.user_id}','admin_officer')">→ Admin Officer</button>
        <button class="ua-btn ua-demote" onclick="changeRole('${u.user_id}','user')">→ User</button>`;
    }
    return `<tr>
      <td><strong>${esc(u.full_name||"—")}</strong>${isMe?' <span style="font-size:10px;color:var(--mu)">(you)</span>':""}</td>
      <td>${pill}</td>
      <td style="font-size:11px;color:var(--fa)">${fmtDate(u.created_at)}</td>
      <td><div style="display:flex;flex-wrap:wrap;gap:2px">${actions}</div></td>
    </tr>`;
  }).join("");

  showModal(`
    <div class="modal-head">
      <span class="modal-title">👑 User Management</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div style="padding:12px 20px;background:#fdf0f1;border-bottom:1px solid #f5d5d8;font-size:12px;color:#9b2335;">
      ${pendingBanner}
      <strong>${all.length}</strong> registered user${all.length!==1?"s":""}. Role changes take effect on next sign-in.
    </div>
    <div style="overflow:auto;max-height:60vh;">
      <table class="user-table">
        <thead><tr><th>Name</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody>${rows.length?rows:`<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--fa)">No users found.</td></tr>`}</tbody>
      </table>
    </div>
  `,false,true);
}

async function changeRole(userId,newRole){
  if(!isAdmin()){toast("Admin access only.","#dc2626");return;}
  loader("Updating…");
  const {error}=await db.from("user_roles").update({role:newRole}).eq("user_id",userId);
  noloader();
  if(error){toast("Failed: "+error.message,"#dc2626");return;}
  toast(`Role updated to ${ROLE_LABELS[newRole]} ✓`,"#16a34a");
  openAdminPanel();
}

function rejectUser(userId,name){
  showModal(`<div class="confirm-box">
    <div class="conf-icon">🗑️</div>
    <div class="conf-title">Reject User?</div>
    <div class="conf-msg"><strong>${esc(name)}</strong>'s account will be permanently deleted.</div>
    <div class="conf-sub">They will not be able to sign in with this account.</div>
    <div class="modal-acts" style="width:100%">
      <button class="btn-cancel" onclick="openAdminPanel()">Cancel</button>
      <button class="btn-danger" onclick="confirmReject('${userId}')">Reject & Delete</button>
    </div>
  </div>`);
}

async function confirmReject(userId){
  if(!isAdmin()){toast("Admin access only.","#dc2626");return;}
  loader("Rejecting user…");
  // Delete from user_roles — the auth user remains but has no role so can't access
  const {error}=await db.from("user_roles").delete().eq("user_id",userId);
  noloader();
  if(error){toast("Failed: "+error.message,"#dc2626");return;}
  toast("User rejected and removed.","#dc2626");
  openAdminPanel();
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(()=>console.log('SW registered'))
      .catch(e=>console.log('SW error:',e));
  });
}
</script>
