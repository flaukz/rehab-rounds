  loader("Rejecting user…");
  // Delete from user_roles — the auth user remains but has no role so can't access
  const {error}=await db.from("user_roles").delete().eq("user_id",userId);
  noloader();
  if(error){toast("Failed: "+error.message,"#dc2626");return;}
  toast("User rejected and removed.","#dc2626");
  openAdminPanel('users');
}

// ═══════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════
let allNotifs=[];
let notifPanelOpen=false;

async function loadNotifications(){
  const {data}=await db.from("notifications")
    .select("*").eq("for_user_id",currentUser.id)
    .order("created_at",{ascending:false}).limit(50);
  allNotifs=(data||[]).map(n=>({
    id:n.id,patientId:n.patient_id,noteType:n.note_type,
    text:n.note_text,authorName:n.author_name,isRead:n.is_read,ts:n.created_at,
    patientRoom:(S.patients.find(x=>x.id===n.patient_id)||{}).room||"",
    kind:(n.note_type||"").toLowerCase().includes("reply")?"reply":"note",
  }));
  updateNotifBadge();
}

function updateNotifBadge(){
  const unread=allNotifs.filter(n=>!n.isRead).length;
  const badge=document.getElementById("notif-badge");
  const btn=document.getElementById("hdr-notif-btn");
  if(!badge||!btn)return;
  if(unread>0){
    badge.textContent=unread>99?"99+":unread;
    badge.style.display="flex";
    btn.style.background="rgba(220,38,38,0.25)";
    btn.style.borderColor="rgba(220,38,38,0.6)";
  }else{
    badge.style.display="none";
    btn.style.background="";
    btn.style.borderColor="";
  }
  syncMobBadge();
}

async function openNotifPanel(){
  const panel=document.getElementById("notif-panel");
  if(!panel)return;
  if(notifPanelOpen){closeNotifPanel();return;}
  notifPanelOpen=true;
  const unreadIds=allNotifs.filter(n=>!n.isRead).map(n=>n.id);
  if(unreadIds.length){
    await db.from("notifications").update({is_read:true}).in("id",unreadIds);
    allNotifs=allNotifs.map(n=>({...n,isRead:true}));
    updateNotifBadge();
  }
  renderNotifPanel();
  panel.style.display="flex";
  setTimeout(()=>document.addEventListener("click",outsideNotifClick),50);
}

function closeNotifPanel(){
  const panel=document.getElementById("notif-panel");
  if(panel)panel.style.display="none";
  notifPanelOpen=false;
  document.removeEventListener("click",outsideNotifClick);
}

function outsideNotifClick(e){
  const panel=document.getElementById("notif-panel");
  const btn=document.getElementById("hdr-notif-btn");
  if(panel&&!panel.contains(e.target)&&btn&&!btn.contains(e.target))closeNotifPanel();
}

function renderNotifPanel(){
  const panel=document.getElementById("notif-panel");if(!panel)return;
  const replyNotifs=buildReplyNotifs();
  const combined=[...allNotifs,...replyNotifs].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const items=combined.length===0
    ?`<div class="notif-empty">🔔<br/>No notifications yet.<br/><span style="font-size:11px">You\'ll be notified when notes or replies are posted for your patients.</span></div>`
    :combined.map(n=>`<div class="notif-item ${n.isRead?"read":"unread"}" onclick="goToPatient(\'${n.patientId}\')">
        <div class="notif-who">✍️ ${esc(n.authorName||"Someone")}</div>
        <div class="notif-where">${n.kind==="reply"?"💬":"📋"} ${esc(n.noteType)}${n.patientRoom?" · Room "+esc(n.patientRoom):""}</div>
        <div class="notif-text">${esc((n.text||"").slice(0,120))}</div>
        <div class="notif-time">🕐 ${fmt(n.ts)}</div>
      </div>`).join("");
  panel.innerHTML=`
    <div class="notif-hdr">
      <span class="notif-title">🔔 Notifications</span>
      <button class="notif-clear" onclick="clearAllNotifs()">Clear All</button>
    </div>
    <div class="notif-list">${items}</div>`;
}

function buildReplyNotifs(){
  const notifs=[];
  const NOTE_LABELS={physician:"Physician Orders",round:"Round Notes",pt:"PT Notes",ot:"OT Notes",slp:"SLP Notes"};
  const histKeys=["physicianHistory","roundHistory","ptHistory","otHistory","slpHistory"];
  const typeKeys=["physician","round","pt","ot","slp"];
  S.patients.forEach(p=>{
    histKeys.forEach((hk,i)=>{
      (p[hk]||[]).forEach(note=>{
        (note.replies||[]).forEach(rep=>{
          if(rep.authorId!==currentUser?.id){
            notifs.push({id:"reply-"+rep.id,patientId:p.id,patientRoom:p.room,
              noteType:NOTE_LABELS[typeKeys[i]]+" Reply",
              authorName:rep.authorName||"Someone",
              text:rep.text,ts:rep.ts,isRead:true,kind:"reply"});
          }
        });
      });
    });
  });
  return notifs.sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,20);
}

function goToPatient(pid){closeNotifPanel();const p=S.patients.find(x=>x.id===pid);if(p)selPat(pid);}

async function clearAllNotifs(){
  if(allNotifs.length)await db.from("notifications").delete().eq("for_user_id",currentUser.id);
  allNotifs=[];updateNotifBadge();renderNotifPanel();
}

function startRealtimeNotifications(){
  db.channel("notif-"+currentUser.id)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"notifications",filter:`for_user_id=eq.${currentUser.id}`},payload=>{
      const n=payload.new;if(!n)return;
      const pat=S.patients.find(x=>x.id===n.patient_id);
      allNotifs.unshift({id:n.id,patientId:n.patient_id,noteType:n.note_type,
        text:n.note_text,authorName:n.author_name,isRead:false,ts:n.created_at,
        patientRoom:pat?.room||"",kind:"note"});
      updateNotifBadge();
      toast(`🔔 ${n.author_name} posted a ${n.note_type} — tap 🔔 to view`,"#7b1f2e");
    }).subscribe();
  db.channel("replies-notif")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"replies"},async payload=>{
      const rep=payload.new;
      if(!rep||rep.author_id===currentUser?.id)return;
      for(const p of S.patients){
        for(const hk of["physicianHistory","roundHistory","ptHistory","otHistory","slpHistory"]){
          const note=(p[hk]||[]).find(n=>n.id===rep.note_id);
          if(note){
            updL(p.id,{[hk]:(p[hk]||[]).map(n=>n.id===rep.note_id?{...n,replies:[...(n.replies||[]),r2l(rep)]}:n)});
            if(S.selected===p.id)renderMain();
            toast(`🔔 ${rep.author_name||"Someone"} replied to a note — tap 🔔 to view`,"#7b1f2e");
            updateNotifBadge();
            break;
          }
        }
      }
    }).subscribe();
}

// ═══════════════════════════════════════
//  MOBILE TAB NAVIGATION
// ═══════════════════════════════════════
const isMobile=()=>window.innerWidth<=768;
let mobActiveTab="patients";

function mobTab(tab){
  if(!isMobile())return;
  mobActiveTab=tab;
  // Update tab active states
  ["patients","dashboard","notes","notif","menu"].forEach(t=>{
    document.getElementById("mtab-"+t)?.classList.toggle("active",t===tab);
  });
  const sidebar=document.getElementById("sidebar");
  const main=document.getElementById("main");
  // Handle each tab
  if(tab==="patients"){
    sidebar?.classList.add("mob-open");
    closeNotifPanel();closeQuickNote();
    // Scroll patient list to top
    document.getElementById("patient-list")?.scrollTo(0,0);
  }else if(tab==="dashboard"){
    sidebar?.classList.remove("mob-open");
    closeNotifPanel();closeQuickNote();
    main?.scrollTo(0,0);
  }else if(tab==="notes"){
    sidebar?.classList.remove("mob-open");
    closeNotifPanel();closeQuickNote();
    // Scroll to notes section
    const noteSection=document.querySelector(".note-card");
    if(noteSection)noteSection.scrollIntoView({behavior:"smooth"});
  }else if(tab==="notif"){
    sidebar?.classList.remove("mob-open");
    openNotifPanel();
    mobActiveTab="notif";
    ["patients","dashboard","notes","notif","menu"].forEach(t=>{
      document.getElementById("mtab-"+t)?.classList.toggle("active",t==="notif");
    });
  }else if(tab==="menu"){
    sidebar?.classList.remove("mob-open");
    closeNotifPanel();closeQuickNote();
    openMobMenu();
  }
}

function openMobMenu(){
  const archiveCount=S.archive.length;
  showModal(`
    <div class="modal-head"><span class="modal-title">⚙️ Menu</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" style="gap:10px;padding:16px;">
      <button class="btn-primary" style="width:100%;padding:14px;font-size:14px;border-radius:10px;text-align:left" onclick="closeModal();togPrivacy()">🔒 Toggle Privacy Mode</button>
      <button class="btn-primary" style="width:100%;padding:14px;font-size:14px;border-radius:10px;text-align:left;background:linear-gradient(135deg,#7c3aed,#5b21b6)" onclick="closeModal();openArchiveModal()">🗄️ Archive ${archiveCount>0?`(${archiveCount})`:""}  </button>
      ${canManageUsers()?`<button class="btn-primary" style="width:100%;padding:14px;font-size:14px;border-radius:10px;text-align:left;background:linear-gradient(135deg,#d97706,#b45309)" onclick="closeModal();openAdminPanel('users')">👑 Admin Panel</button>`:""}
      ${canManagePatients()?`<button class="btn-primary" style="width:100%;padding:14px;font-size:14px;border-radius:10px;text-align:left;background:linear-gradient(135deg,#16a34a,#15803d)" onclick="closeModal();openAddModal()">➕ Add Patient</button>`:""}
      <button class="btn-danger" style="width:100%;padding:14px;font-size:14px;border-radius:10px;text-align:left" onclick="closeModal();doLogout()">👋 Sign Out</button>
    </div>`);
}

// Auto-select patient tab on mobile when patient is selected
function mobSelPat(id){
  selPat(id);
  if(isMobile()){
    setTimeout(()=>mobTab("dashboard"),80);
  }
}

// Sync mobile notif badge with main badge
function syncMobBadge(){
  const unread=allNotifs.filter(n=>!n.isRead).length;
  const badge=document.getElementById("mob-notif-badge");
  if(!badge)return;
  if(unread>0){badge.style.display="flex";badge.textContent=unread>99?"99+":unread;}
  else badge.style.display="none";
}
