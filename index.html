<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salma Rahba – Rounding System</title>
<meta name="description" content="Hospital Rounding System – Salma Rahba Rehabilitation Medicine"/>
<meta name="theme-color" content="#7b1f2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Rounding"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --deep:#7b1f2e;--mid:#9b2335;--lite:#b83245;
  --bg:#fdf4f5;--pale:#fdf0f1;--border:#f0cdd1;--soft:#fad5d9;--sidebar:#fdf7f7;
  --td:#2d1417;--tm:#3d1e22;--mu:#9b6670;--fa:#b08088;
  --font:'DM Sans',sans-serif;--disp:'DM Serif Display',serif;
  --sh:0 2px 10px rgba(120,30,40,0.07);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--td);}
button{font-family:var(--font);cursor:pointer;}
input,select,textarea{font-family:var(--font);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#e8c0c5;border-radius:10px;}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#7b1f2e 0%,#9b2335 50%,#b83245 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:#fff;border-radius:20px;padding:36px 36px 32px;width:min(400px,94vw);box-shadow:0 24px 64px rgba(0,0,0,0.2);}
.login-logo{text-align:center;margin-bottom:20px;}
.login-logo .icon{font-size:42px;margin-bottom:12px;}
.login-logo h1{font-family:var(--disp);font-size:21px;color:var(--deep);line-height:1.3;}
.login-logo p{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:0.08em;margin-top:5px;}
.auth-tabs{display:flex;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1.5px solid #edcacf;}
.auth-tab{flex:1;padding:9px;border:none;background:#fdf8f8;font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;transition:all 0.15s;}
.auth-tab:first-child{border-right:1px solid #edcacf;}
.auth-tab.active{background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px;}
.lf input{width:100%;padding:11px 13px;border-radius:9px;border:1.5px solid #edcacf;font-size:14px;color:var(--td);outline:none;background:#fdf8f8;}
.lf input:focus{border-color:var(--mid);box-shadow:0 0 0 3px rgba(155,35,53,0.12);}
.login-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;font-size:14px;font-weight:700;margin-top:6px;letter-spacing:0.03em;}
.login-btn:hover{opacity:0.9;}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;}
.login-err{font-size:12px;color:#dc2626;text-align:center;margin-top:10px;min-height:16px;}
.login-ok{font-size:12px;color:#16a34a;text-align:center;margin-top:10px;min-height:16px;}
.login-note{font-size:11px;color:var(--mu);text-align:center;margin-top:10px;line-height:1.6;}

/* APP */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden;}
#header{background:linear-gradient(135deg,var(--deep) 0%,var(--mid) 60%,var(--lite) 100%);height:58px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;box-shadow:0 2px 12px rgba(123,31,46,0.22);}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.hdr-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:18px;}
.hdr-title{font-family:var(--disp);font-size:14px;color:#fff;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,0.65);letter-spacing:0.08em;text-transform:uppercase;}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hdr-btn{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.12);color:#fff;font-size:12px;font-weight:600;transition:opacity 0.15s;}
.hdr-btn:hover{opacity:0.8;}
.hdr-date{font-size:12px;color:rgba(255,255,255,0.75);}
.hdr-user{font-size:12px;color:rgba(255,255,255,0.85);font-weight:600;}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;cursor:pointer;}
.hdr-avatar:hover{background:rgba(255,255,255,0.32);}
#body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
#sidebar{width:300px;flex-shrink:0;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:14px 14px 10px;}
.sidebar-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sidebar-lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.09em;}
.btn-add{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--deep),var(--mid));color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;}
.search-input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid #edcacf;background:#fff;font-size:12px;color:var(--tm);outline:none;}
.search-input:focus{border-color:var(--mid);}
#patient-list{overflow-y:auto;flex:1;padding-bottom:10px;}
.empty-list{padding:24px 14px;text-align:center;color:var(--fa);font-size:13px;}
.sidebar-foot{padding:10px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--mu);background:var(--sidebar);}

/* WARD SECTIONS */
.ward-section{border-bottom:1px solid var(--border);}
.ward-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;background:var(--sidebar);border:none;width:100%;text-align:left;transition:background 0.12s;}
.ward-hdr:hover{background:#fae8ea;}
.ward-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ward-name{font-size:12px;font-weight:700;color:var(--td);flex:1;}
.ward-cnt{font-size:10px;font-weight:700;color:var(--mu);background:#f5d5d8;border-radius:20px;padding:1px 7px;}
.ward-chev{font-size:10px;color:var(--fa);}
.ward-pats{display:block;}.ward-pats.collapsed{display:none;}
.pri-section{border-bottom:2px solid #f5b8c0;}
.pri-hdr{background:linear-gradient(90deg,#fdf0f1,#fdf7f7)!important;}
.pri-hdr:hover{background:#fae8ea!important;}
.urg-section{border-bottom:2px solid #fca5a5;}
.urg-hdr{background:linear-gradient(90deg,#fff1f1,#fdf7f7)!important;}
.urg-hdr:hover{background:#fee2e2!important;}
.unst-section{border-bottom:2px solid #fcd34d;}
.unst-hdr{background:linear-gradient(90deg,#fffbeb,#fdf7f7)!important;}
.unst-hdr:hover{background:#fef3c7!important;}
.urg-badge{font-size:11px;font-weight:700;background:#dc2626;color:#fff;border-radius:6px;padding:2px 8px;}
.pri-badge{font-size:11px;font-weight:700;background:#fee2e2;color:#dc2626;border-radius:6px;padding:2px 8px;}
.ptoggle{width:100%;padding:8px 11px;border-radius:8px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid #edcacf;background:#fdf8f8;color:#b08088;cursor:pointer;transition:all 0.15s;}
.ptoggle.on{border-color:#dc2626;background:#fee2e2;color:#dc2626;}
.utoggle{width:100%;padding:8px 11px;border-radius:8px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid #edcacf;background:#fdf8f8;color:#b08088;cursor:pointer;transition:all 0.15s;}
.utoggle.on{border-color:#dc2626;background:#dc2626;color:#fff;}

/* PATIENT ROWS */
.pat-row{padding:11px 14px;border-left:3px solid transparent;cursor:pointer;border-bottom:1px solid #f0e4e6;background:#fff;transition:background 0.12s;position:relative;}
.pat-row:nth-child(even){background:#fdf4f5;}
.pat-row:hover{background:#fae8ea;}
.pat-row:nth-child(even):hover{background:#fae8ea;}
.pat-row.active{background:var(--soft)!important;border-left-color:var(--mid)!important;}
.row-top{display:flex;justify-content:space-between;align-items:flex-start;}
.row-room{font-size:11px;font-weight:700;color:var(--mid);background:var(--soft);border-radius:5px;padding:1px 6px;}
.row-name{font-weight:600;font-size:13px;color:var(--td);margin-top:5px;}
.row-mrn{font-size:11px;color:#b08088;margin-top:2px;}
.row-bot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.row-pt{font-size:11px;color:var(--mu);}
.row-done{font-size:10px;color:var(--fa);}.row-done.complete{color:#16a34a;}
.row-acts{position:absolute;bottom:8px;right:10px;display:none;gap:5px;}
.pat-row:hover .row-acts{display:flex;}
.re-btn{padding:3px 9px;border-radius:6px;border:1px solid #edcacf;background:#fdf0f1;color:var(--mid);font-size:11px;font-weight:600;}
.re-btn:hover{background:#f7d5d8;}
.ra-btn{padding:3px 9px;border-radius:6px;border:1px solid #fecaca;background:#fff5f5;color:#dc2626;font-size:11px;font-weight:600;}
.ra-btn:hover{background:#fee2e2;}
.rd-btn{padding:3px 8px;border-radius:6px;border:1px solid #fca5a5;background:#dc2626;color:#fff;font-size:11px;font-weight:700;}
.rd-btn:hover{background:#b91c1c;}

/* BADGES */
.cls-badge{font-size:10px;font-weight:600;border-radius:5px;padding:2px 7px;}
.cls-ABM{background:#fad5d9;color:#7b1f2e;}.cls-LC{background:#dcfce7;color:#166534;}
.cls-LTC{background:#fef9c3;color:#854d0e;}.cls-SSR{background:#fce7f3;color:#9d174d;}
.cls-PAR{background:#ede9fe;color:#5b21b6;}
.ward-dot-warda{background:#7b1f2e;}.ward-dot-wardb{background:#10b981;}
.ward-dot-icu1{background:#f59e0b;}.ward-dot-icu2{background:#ef4444;}
.wbadge{font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.wbadge-warda{background:#fad5d9;color:#7b1f2e;}.wbadge-wardb{background:#d1fae5;color:#065f46;}
.wbadge-icu1{background:#fef3c7;color:#92400e;}.wbadge-icu2{background:#fee2e2;color:#991b1b;}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:20px 24px;}
.empty-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}

/* ═══════════════════════════════════════
   MOBILE RESPONSIVE  (≤768px)
═══════════════════════════════════════ */
@media(max-width:768px){
  /* Header — tighten */
  #header{height:52px;padding:0 12px;gap:6px;}
  .hdr-title{font-size:12px;}
  .hdr-sub{display:none;}
  .hdr-icon{width:28px;height:28px;font-size:15px;}
  .hdr-date{display:none;}
  .hdr-user{display:none;}
  #hdr-role-badge{display:none;}
  .hdr-btn{padding:5px 8px;font-size:11px;gap:4px;}
  /* Hide text on small buttons, keep icons */
  .hdr-btn#hdr-privacy-btn::after{content:"🔓";}
  .hdr-actions{gap:4px;}

  /* Body layout — stack vertically */
  #body{flex-direction:column;position:relative;overflow:hidden;}

  /* Sidebar — full width panel, slides in/out */
  #sidebar{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    width:100%;
    z-index:100;
    transform:translateX(-100%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    border-right:none;
    padding-bottom:70px;
  }
  #sidebar.mob-open{transform:translateX(0);}

  /* Main — full width, padded for bottom tab bar */
  #main{padding:14px 14px 80px;}
  .pat-card{padding:14px 16px;}
  .pat-card-l{gap:10px;}
  .pat-meta{gap:6px;}

  /* Quick note panel — full width bottom sheet */
  #quick-note-panel{
    left:0!important;right:0!important;
    bottom:64px!important;
    width:100%!important;
    border-radius:16px 16px 0 0!important;
    max-height:80vh;
    overflow-y:auto;
  }

  /* Notification panel — full width */
  .notif-panel{
    top:52px;left:0;right:0;width:100%;
    border-radius:0;max-height:70vh;
  }

  /* Modals — full width */
  .modal{width:100%!important;max-width:100%!important;border-radius:16px 16px 0 0!important;position:fixed!important;bottom:0!important;top:auto!important;max-height:92vh;overflow-y:auto;}
  .modal-overlay{align-items:flex-end!important;}

  /* Cards — full width, less padding */
  .chk-card,.note-card,.eq-card{border-radius:12px;margin-bottom:14px;}
  .chk-items{gap:8px;}
  .g2{grid-template-columns:1fr!important;}

  /* Row actions — always visible on mobile (no hover) */
  .row-acts{display:flex;position:static;margin-top:8px;}
  .pat-row:hover .row-acts{display:flex;}

  /* ── BOTTOM TAB BAR ── */
  #mob-tab-bar{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    height:64px;
    background:#fff;
    border-top:1px solid #f0cdd1;
    box-shadow:0 -4px 20px rgba(123,31,46,0.1);
    z-index:200;
  }
  .mob-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;border:none;background:transparent;cursor:pointer;
    font-size:9px;font-weight:700;color:var(--mu);
    text-transform:uppercase;letter-spacing:0.05em;padding:8px 4px;
    transition:color 0.15s;position:relative;
  }
  .mob-tab .tab-icon{font-size:22px;line-height:1;}
  .mob-tab.active{color:var(--mid);}
  .mob-tab.active::before{
    content:"";position:absolute;top:0;left:20%;right:20%;
    height:3px;background:linear-gradient(90deg,var(--deep),var(--mid));
    border-radius:0 0 4px 4px;
  }
  .mob-tab-badge{
    position:absolute;top:6px;right:calc(50% - 18px);
    background:#dc2626;color:#fff;font-size:9px;font-weight:700;
    border-radius:50%;width:16px;height:16px;
    display:none;align-items:center;justify-content:center;line-height:1;
  }
}
/* Hide tab bar on desktop */
#mob-tab-bar{display:none;}

/* PATIENT CARD */
.pat-card{background:#fff;border-radius:14px;padding:18px 22px;border:1px solid #f5d5d8;box-shadow:var(--sh);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.pat-card-l{display:flex;align-items:center;gap:16px;}
.pat-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#f5b8c0,#ee9aaa);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--deep);flex-shrink:0;}
.pat-fullname{font-family:var(--disp);font-size:22px;color:var(--td);}
.pat-meta{display:flex;gap:14px;margin-top:3px;flex-wrap:wrap;}
.pat-meta span{font-size:12px;color:var(--mu);}
.pat-card-r{display:flex;align-items:center;gap:10px;}
.edit-pat-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;border:1.5px solid #edcacf;background:#fdf0f1;color:var(--mid);font-size:12px;font-weight:600;}
.edit-pat-btn:hover{background:#f7d5d8;}

/* CHECKLIST */
.chk-card{background:#fff;border-radius:14px;border:1px solid #f5d5d8;box-shadow:var(--sh);margin-bottom:18px;overflow:hidden;}
.card-hdr{padding:12px 20px;background:linear-gradient(90deg,#fdf0f1,#fdf8f8);border-bottom:1px solid #f5d5d8;display:flex;align-items:center;gap:8px;}
.card-hdr-lbl{font-weight:700;font-size:13px;color:#7b1f2e;letter-spacing:0.03em;}
.chk-items{display:flex;gap:14px;padding:16px 20px;flex-wrap:wrap;}
.chk-divider{display:flex;align-items:center;gap:10px;padding:8px 20px;background:linear-gradient(90deg,#fdf0f1,#fdf8f8);border-top:1px solid #f0cdd1;border-bottom:1px solid #f0cdd1;font-size:12px;font-weight:700;color:#7b1f2e;letter-spacing:0.04em;}
.chk-btn{flex:1;min-width:140px;padding:14px 16px;border-radius:12px;border:2px solid #f5d5d8;background:#fdf8f8;text-align:left;display:flex;align-items:center;gap:12px;transition:all 0.15s;}
.chk-btn:hover{transform:scale(1.02);}
.chk-box{width:28px;height:28px;border-radius:8px;background:#f5d5d8;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:background 0.15s;flex-shrink:0;}
.chk-lbl{font-weight:600;font-size:13px;color:#64748b;}
.chk-sub{font-size:10px;color:var(--fa);margin-top:1px;}
.eq-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;border:1.5px solid #edcacf;background:#fdf8f8;cursor:pointer;font-family:var(--font);transition:all 0.15s;}
.eq-btn:hover{background:#faeaec;border-color:#d4929c;}
.eq-btn.checked{border-color:#9b2335;background:linear-gradient(135deg,#fad5d9,#fff8f8);}
.eq-icon{font-size:16px;}.eq-lbl{font-size:12px;font-weight:600;color:#3d1e22;}
.eq-btn.checked .eq-lbl{color:#7b1f2e;}
.eq-chk{font-size:11px;font-weight:700;color:#9b2335;background:#fad5d9;border-radius:20px;padding:1px 7px;margin-left:2px;}
.eq-other{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid #edcacf;outline:none;font-size:13px;color:#3d1e22;background:#fdf8f8;font-family:var(--font);}
.eq-other:focus{border-color:#9b2335;}
.eq-others-saved{background:#fdf8f8;border:1.5px solid #edcacf;border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.eq-others-text{font-size:13px;color:#3d1e22;flex:1;}
.eq-others-acts{display:flex;gap:6px;flex-shrink:0;}
.eq-others-edit{display:flex;flex-direction:column;}

/* NOTES */
.notes-wrap{display:flex;flex-direction:column;gap:14px;}
.note-card{background:#fff;border-radius:12px;border:1px solid #f5d5d8;overflow:hidden;box-shadow:0 1px 4px rgba(123,31,46,0.06);}
.note-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;background:linear-gradient(90deg,#fdf0f1,#fdf8f8);border-bottom:1px solid #f5d5d8;}
.note-hdr-lbl{font-weight:600;font-size:13px;color:#7b1f2e;letter-spacing:0.03em;}
.note-cnt{margin-left:auto;font-size:11px;color:var(--mu);background:#fae8ea;border-radius:20px;padding:2px 9px;}
.note-input-area{padding:12px 16px 0;}
.note-ta{width:100%;min-height:80px;padding:10px 12px;border-radius:8px;border:1.5px solid #edcacf;outline:none;resize:vertical;font-size:13px;color:var(--tm);background:#fdf8f8;line-height:1.7;transition:border-color 0.15s;}
.note-ta:focus{border-color:var(--mid);box-shadow:0 0 0 3px rgba(155,35,53,0.12);}
.note-save-row{display:flex;justify-content:flex-end;padding:8px 16px 12px;}
.note-save-btn{padding:6px 18px;border-radius:8px;border:none;background:#edcacf;color:#fff;font-size:12px;font-weight:700;letter-spacing:0.03em;transition:background 0.15s;}
.note-save-btn.active{background:linear-gradient(135deg,var(--deep),var(--mid));cursor:pointer;}
.note-hist{border-top:1px solid #fae8ea;}
.note-day-group{margin-bottom:4px;}
.note-day-lbl{font-size:10px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:0.07em;padding:6px 16px 4px;background:#fdf8f8;border-bottom:1px solid #f5d5d8;}
.prev-notes-details{border:none;outline:none;}
.prev-notes-summary{font-size:11px;font-weight:700;color:var(--mu);padding:7px 16px;cursor:pointer;list-style:none;background:#f8f4f5;border-bottom:1px solid #f0e4e6;user-select:none;}
.prev-notes-summary::-webkit-details-marker{display:none;}
.prev-notes-summary::before{content:"▶ ";font-size:9px;}
details[open] .prev-notes-summary::before{content:"▼ ";}
.note-hist-lbl{padding:8px 16px 4px;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.07em;}
.note-entry{border-top:1px solid #fdf0f1;}
.note-entry-hdr{display:flex;align-items:center;gap:8px;padding:9px 16px;}
.note-entry-hdr:hover{background:#fdf8f8;}
.note-ts{font-size:11px;color:var(--lite);font-weight:600;flex:1;cursor:pointer;line-height:1.5;}

/* ═══════════════════════════════
   MOBILE RESPONSIVE (≤768px)
═══════════════════════════════ */
@media(max-width:768px){
  /* HEADER */
  #header{padding:10px 14px;flex-wrap:wrap;gap:8px;}
  .hdr-brand{flex:1;min-width:0;}
  .hdr-title{font-size:12px;}
  .hdr-sub{display:none;}
  .hdr-actions{gap:5px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
  .hdr-btn{padding:5px 9px;font-size:11px;gap:4px;white-space:nowrap;flex-shrink:0;}
  #hdr-role-badge{font-size:9px;padding:2px 7px;}
  .hdr-date{display:none;}
  .hdr-user{display:none;}
  .hdr-avatar{width:28px;height:28px;font-size:11px;}

  /* BODY LAYOUT — stack vertically, sidebar becomes a panel */
  #body{flex-direction:column;position:relative;overflow:hidden;}
  #sidebar{
    width:100%;height:100%;
    border-right:none;border-bottom:none;
    position:absolute;top:0;left:0;right:0;bottom:0;
    z-index:10;transform:translateX(0);
    transition:transform 0.25s ease;
    display:flex;flex-direction:column;
  }
  #sidebar.mob-hidden{transform:translateX(-100%);}
  #main{
    width:100%;
    position:absolute;top:0;left:0;right:0;bottom:56px;
    overflow-y:auto;padding:14px;
    transform:translateX(100%);
    transition:transform 0.25s ease;
  }
  #main.mob-visible{transform:translateX(0);}

  /* BOTTOM TAB BAR */
  #mob-tabbar{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    height:56px;background:#fff;border-top:1.5px solid var(--border);
    z-index:200;box-shadow:0 -4px 16px rgba(123,31,46,0.08);
  }
  .mob-tab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;border:none;background:transparent;cursor:pointer;
    color:var(--mu);font-size:9px;font-weight:600;letter-spacing:0.03em;
    padding:6px 4px;transition:color 0.15s;
  }
  .mob-tab .mob-tab-icon{font-size:20px;line-height:1;}
  .mob-tab.active{color:var(--mid);}
  .mob-tab.active .mob-tab-icon{transform:scale(1.1);}
  .mob-more-btn{width:100%;padding:14px 18px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-size:14px;font-weight:600;color:var(--td);text-align:left;display:flex;align-items:center;gap:10px;}
  .mob-more-btn:hover{background:var(--pale);}
  .mob-more-btn:active{background:var(--soft);}

  /* SIDEBAR MOBILE TWEAKS */
  .sidebar-hdr{padding:12px 14px;}
  .sidebar-search{padding:0 10px 10px;}
  #patient-list{padding-bottom:0;}
  .pat-row{padding:12px 14px;}
  .row-acts{gap:4px;}
  .re-btn,.rq-btn{padding:5px 8px;font-size:12px;}
  .ra-btn{padding:4px 8px;font-size:11px;}
  .rd-btn{padding:4px 6px;font-size:12px;}
  .sidebar-foot{padding:8px 14px;font-size:10px;}

  /* MAIN MOBILE TWEAKS */
  .pat-card{flex-direction:column;gap:10px;padding:14px;}
  .pat-card-l{flex-direction:column;gap:8px;align-items:flex-start;}
  .pat-avatar{width:36px;height:36px;font-size:14px;}
  .pat-meta{gap:6px;}
  .pat-card-r{flex-wrap:wrap;gap:6px;}
  .chk-items{flex-wrap:wrap;gap:8px;}
  .chk-items button{min-width:calc(50% - 4px);flex:none;}
  .g2{grid-template-columns:1fr;}
  .modal-box{width:98vw;border-radius:14px;}
  .modal-body{padding:16px 18px;}
  .modal-acts{padding:0 18px 18px;}

  /* QUICK NOTE PANEL MOBILE */
  #quick-note-panel{left:0!important;right:0!important;bottom:56px!important;width:100%!important;border-radius:16px 16px 0 0;}

  /* NOTIF PANEL MOBILE */
  .notif-panel{left:8px!important;right:8px!important;width:auto!important;top:54px!important;}

  /* NOTE CARDS MOBILE */
  .note-entry-hdr{flex-wrap:wrap;gap:4px;}
  .note-acts{flex-wrap:wrap;gap:3px;}
  .note-hdr{flex-wrap:wrap;gap:6px;}
  .chk-divider{margin:14px 0 8px;}
  .eq-grid{grid-template-columns:repeat(2,1fr);}

  /* HIDE desktop-only elements on mobile */
  .hdr-sep{display:none;}
}

/* TABLET (769–1024px) — minor adjustments */
@media(min-width:769px) and (max-width:1024px){
  #sidebar{width:240px;}
  #main{padding:16px 18px;}
  .hdr-btn{padding:5px 10px;font-size:11px;}
  #mob-tabbar{display:none;}
}

/* DESKTOP — hide mobile-only elements */
@media(min-width:769px){
  #mob-tabbar{display:none;}
  #sidebar{transform:none!important;}
  #main{transform:none!important;position:relative;bottom:auto;}
}

.loader-box{background:#fff;border-radius:14px;padding:24px 32px;font-size:14px;color:var(--deep);font-weight:600;display:flex;align-items:center;gap:12px;}
.spin{width:20px;height:20px;border:3px solid #f5d5d8;border-top-color:#9b2335;border-radius:50%;animation:spin 0.7s linear infinite;}

<script>
// ═══════════════════════════════════════
//  SUPABASE INIT
// ═══════════════════════════════════════
const { createClient } = supabase;
const db = createClient(
  "https://rlysdurcxsdtpdohewjo.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJseXNkdXJjeHNkdHBkb2hld2pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTI5MzksImV4cCI6MjA5MTQ4ODkzOX0.0jy9hBiYbP0yVdvly6XTjrrzzb19SjysYMbwVFov1zQ"
);

// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
const CLSS = ["ABM","LC","LTC","SSR","PAR"];
const WARDS = [
  {id:"Ward A",label:"Ward A",dc:"ward-dot-warda",bc:"wbadge-warda"},
  {id:"Ward B",label:"Ward B",dc:"ward-dot-wardb",bc:"wbadge-wardb"},
  {id:"ICU 1", label:"ICU 1", dc:"ward-dot-icu1", bc:"wbadge-icu1"},
  {id:"ICU 2", label:"ICU 2", dc:"ward-dot-icu2", bc:"wbadge-icu2"},
];
const DEF_CHK = {stable:false,unstable:false,bariatricWheelchair:false,comfortWheelchair:false,highframeWalker:false,hoist:false,medicalBed:false,sling:false,standardWalker:false,standardWheelchair:false,wheeledWalker:false};

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let S = { patients:[], archive:[], selected:null, search:"" };
let currentUser=null, currentName="", currentRole="pending";
let staffDir=[]; // [{userId, fullName, discipline, phone}] — loaded on login
const isAdmin        = ()=>currentRole==="admin";
const canManagePatients = ()=>["admin","admin_officer"].includes(currentRole);
const canDeletePatients = ()=>currentRole==="admin";
const canManageUsers    = ()=>currentRole==="admin";
const canWriteNotes     = ()=>["admin","admin_officer","user"].includes(currentRole);
const collapsed = new Set(["__urg__","__pri__","__unst__","Ward A","Ward B","ICU 1","ICU 2"]);

function initCollapsed(){
  collapsed.clear();
  collapsed.add("__urg__");
  collapsed.add("__pri__");
  collapsed.add("__unst__");
  WARDS.forEach(w=>collapsed.add(w.id));
}

function expandPatientGroup(pid){
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  if(p.isUrgent){collapsed.delete("__urg__");return;}
  if(p.highPriority){collapsed.delete("__pri__");return;}
  if(p.checklist?.unstable){collapsed.delete("__unst__");return;}
  collapsed.delete(p.ward||"Ward A");
}

// ═══════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
const fmt=iso=>{if(!iso)return"—";try{return new Date(iso).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true});}catch{return"—";}};
const wkey=w=>w.toLowerCase().replace(/\s+/g,"");
const wbc=w=>`wbadge wbadge-${wkey(w||"Ward A")}`;

// ── PRIVACY MODE ──────────────────────────────────────────────
let privacyMode=false;
function maskName(name){
  if(!privacyMode||!name)return name||"";
  const parts=name.trim().split(/\s+/);
  if(parts.length===1)return parts[0]; // single word — show as-is
  // Show first name only, mask the rest with •••
  return parts[0]+" "+"•".repeat(Math.max(3,parts.slice(1).join(" ").length));
}
function maskMRN(mrn){
  if(!privacyMode||!mrn)return mrn||"";
  const s=String(mrn);
  if(s.length<=2)return s;
  return "•".repeat(s.length-2)+s.slice(-2);
}
function togPrivacy(){
  privacyMode=!privacyMode;
  const btn=document.getElementById("hdr-privacy-btn");
  if(btn){
    btn.textContent=privacyMode?"🔒 Privacy":"🔓 Privacy";
    btn.style.background=privacyMode?"rgba(220,38,38,0.35)":"rgba(255,255,255,0.12)";
    btn.style.borderColor=privacyMode?"rgba(220,38,38,0.7)":"rgba(255,255,255,0.35)";
  }
  renderSidebar();renderMain();
  toast(privacyMode?"🔒 Privacy mode ON — names & MRNs masked":"🔓 Privacy mode OFF","#475569");
}
let _tt;
function toast(msg,color="#9b2335"){const e=document.getElementById("toast");e.textContent=msg;e.style.background=color;e.style.display="block";clearTimeout(_tt);_tt=setTimeout(()=>e.style.display="none",3500);}
function loader(msg){document.getElementById("loader-msg").textContent=msg||"Loading…";document.getElementById("loader").classList.add("visible");}
function noloader(){document.getElementById("loader").classList.remove("visible");}
function getSel(){return S.patients.find(p=>p.id===S.selected);}

// ═══════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════
function switchAuthTab(tab){
  document.getElementById("panel-signin").style.display=tab==="signin"?"block":"none";
  document.getElementById("panel-register").style.display=tab==="register"?"block":"none";
  document.getElementById("tab-signin").className="auth-tab"+(tab==="signin"?" active":"");
  document.getElementById("tab-register").className="auth-tab"+(tab==="register"?" active":"");
  document.getElementById("login-err").textContent="";
  document.getElementById("register-err").textContent="";
  document.getElementById("register-ok").textContent="";
  // Clear register fields when switching to sign-in to avoid confusion
  if(tab==="signin"){
    ["rn","rph","re","rp","rp2"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  }
}

async function doLogin(){
  const email=document.getElementById("le").value.trim();
  const pass=document.getElementById("lp").value;
  const err=document.getElementById("login-err");
  const btn=document.getElementById("login-btn");
  err.textContent="";
  if(!email||!pass){err.textContent="Please enter email and password.";return;}
  btn.disabled=true;btn.textContent="Signing in…";
  try{
    const {data,error}=await db.auth.signInWithPassword({email,password:pass});
    btn.disabled=false;btn.textContent="Sign In";
    if(error){err.textContent=error.message;return;}
    await onLogin(data.user);
  }catch(e){
    btn.disabled=false;btn.textContent="Sign In";
    err.textContent="Unexpected error: "+e.message;
  }
}

async function doRegister(){
  const name=document.getElementById("rn").value.trim();
  const phone=(document.getElementById("rph")?.value||"").trim().replace(/\D/g,"");
  const email=document.getElementById("re").value.trim();
  const pass=document.getElementById("rp").value;
  const pass2=document.getElementById("rp2").value;
  const err=document.getElementById("register-err");
  const ok=document.getElementById("register-ok");
  const btn=document.getElementById("register-btn");
  err.textContent="";ok.textContent="";
  if(!name||!email||!pass||!pass2){err.textContent="Please fill in all fields.";return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent="Please enter a valid email address.";return;}
  if(pass.length<6){err.textContent="Password must be at least 6 characters.";return;}
  if(pass!==pass2){err.textContent="Passwords do not match.";return;}
  btn.disabled=true;btn.textContent="Creating account…";
  try{
    const {data,error}=await db.auth.signUp({
      email,password:pass,
      options:{data:{full_name:name}}
    });
    btn.disabled=false;btn.textContent="Create Account";
    if(error){err.textContent=error.message;return;}
    if(!data?.user){err.textContent="Something went wrong. Please try again.";return;}
    await db.from("user_roles").upsert(
      {user_id:data.user.id,role:"pending",full_name:name,phone},
      {onConflict:"user_id"}
    );
    ["rn","rph","re","rp","rp2"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    ok.textContent="✅ Account created! Your account is pending admin approval. You'll be able to sign in once approved.";
  }catch(e){
    btn.disabled=false;btn.textContent="Create Account";
    err.textContent="Unexpected error: "+e.message;
  }
}
async function onLogin(user){
  currentUser=user;
  currentName=user.user_metadata?.full_name||user.email.split("@")[0];

  // Try fetching role up to 2 times (handles transient RLS/network issues)
  let roleRow=null, roleErr=null;
  for(let attempt=0;attempt<2;attempt++){
    const res=await db.from("user_roles").select("role,full_name").eq("user_id",user.id).maybeSingle();
    roleErr=res.error;
    roleRow=res.data;
    if(roleRow||(!res.error))break;
    await new Promise(r=>setTimeout(r,800)); // brief pause before retry
  }

  if(roleRow){
    currentRole=roleRow.role||"pending";
    if(roleRow.full_name)currentName=roleRow.full_name;
  }else if(roleErr){
    // RLS or network blocked the query — show actionable error, never write
    await db.auth.signOut();
    const err=document.getElementById("login-err");
    if(err)err.textContent="Sign-in error: could not read your account role. Please check your Supabase RLS policies or contact your admin. ("+roleErr.message+")";
    const btn=document.getElementById("login-btn");
    if(btn){btn.disabled=false;btn.textContent="Sign In";}
    return;
  }else{
    // Confirmed: no row exists at all — brand new user, insert as pending
    await db.from("user_roles").insert({user_id:user.id,role:"pending",full_name:currentName});
    currentRole="pending";
  }

  // Block pending users
  if(currentRole==="pending"){
    await db.auth.signOut();
    const err=document.getElementById("login-err");
    if(err)err.textContent="⏳ Your account is pending admin approval. Please wait for approval before signing in.";
    const btn=document.getElementById("login-btn");
    if(btn){btn.disabled=false;btn.textContent="Sign In";}
    return;
  }

  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="flex";
  const av=document.getElementById("hdr-av");
  av.textContent=currentName.slice(0,2).toUpperCase();
  av.title=`Signed in as ${user.email} — click to sign out`;
  document.getElementById("hdr-user").textContent=currentName;

  // Show/hide header buttons based on role
  const adminBtn=document.getElementById("hdr-admin-btn");
  const addBtn=document.getElementById("btn-add-patient");
  if(adminBtn)adminBtn.style.display=canManageUsers()?"":"none";
  if(addBtn)addBtn.style.display=canManagePatients()?"":"none";

  // Role badge
  const roleBadge=document.getElementById("hdr-role-badge");
  if(roleBadge){
    const badgeMap={
      "admin":       {label:"👑 Admin",        bg:"#fbbf24",color:"#1e1e1e"},
      "admin_officer":{label:"🔷 Admin Officer",bg:"#a78bfa",color:"#1e1e1e"},
      "user":        {label:"👤 User",          bg:"rgba(255,255,255,0.2)",color:"#fff"},
    };
    const b=badgeMap[currentRole]||{label:currentRole,bg:"rgba(255,255,255,0.15)",color:"#fff"};
    roleBadge.textContent=b.label;
    roleBadge.style.background=b.bg;
    roleBadge.style.color=b.color;
  }

  loader("Loading patients…");
  await loadAll();
  await loadStaffDir();
  noloader();
  await loadNotifications();
  startRealtimeNotifications();
  render();
  initMobileState();
}
function doLogout(){
  showModal(`<div class="confirm-box">
    <div class="conf-icon">👋</div>
    <div class="conf-title">Sign Out?</div>
    <div class="conf-msg">You will be returned to the login screen.</div>
    <div class="conf-sub"></div>
    <div class="modal-acts" style="width:100%">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmLogout()">Sign Out</button>
    </div>
  </div>`);
}
async function confirmLogout(){
  closeModal();
  await db.auth.signOut();
  location.reload();
}
(async()=>{
  try{
    const {data}=await db.auth.getSession();
    if(data?.session?.user)await onLogin(data.session.user);
  }catch(e){
    console.error("Session restore error:",e);
  }
})();

// ═══════════════════════════════════════
//  DB LOAD
// ═══════════════════════════════════════
async function loadAll(){
  const [pR,nR,rR]=await Promise.all([
    db.from("patients").select("*").order("created_at"),
    db.from("notes").select("*").order("created_at"),
    db.from("replies").select("*").order("created_at"),
  ]);
  const repMap={};
  (rR.data||[]).forEach(r=>{if(!repMap[r.note_id])repMap[r.note_id]=[];repMap[r.note_id].push(r2l(r));});
  const noteMap={};
  (nR.data||[]).forEach(n=>{const k=n.patient_id+"_"+n.note_type;if(!noteMap[k])noteMap[k]=[];noteMap[k].push(n2l(n,repMap[n.id]||[]));});
  S.patients=[];S.archive=[];
  (pR.data||[]).forEach(p=>{
    const lp=p2l(p,noteMap);
    if(p.is_archived)S.archive.push({...lp,archivedAt:p.archived_at});
    else S.patients.push(lp);
  });
  // Reset selected if it no longer exists in the active list
  const ids=S.patients.map(p=>p.id);
  if(!S.selected||!ids.includes(S.selected)){
    S.selected=S.patients.length?S.patients[0].id:null;
  }
  // Collapse all groups on every load
  initCollapsed();
}
async function loadStaffDir(){
  const {data}=await db.from("user_roles")
    .select("user_id,full_name,discipline,phone")
    .neq("role","pending")
    .order("full_name");
  staffDir=(data||[]).filter(u=>u.full_name&&u.discipline).map(u=>({
    userId:u.user_id,fullName:u.full_name,discipline:u.discipline||"",phone:u.phone||"",
  }));
}

const p2l=(p,nm)=>({
  id:p.id,room:p.room,name:p.name,mrn:p.mrn,
  primaryPt:p.primary_pt||"",primaryOt:p.primary_ot||"",primarySlp:p.primary_slp||"",
  ptPhone:p.pt_phone||"",otPhone:p.ot_phone||"",slpPhone:p.slp_phone||"",
  secondaryPt:p.secondary_pt||"",secondaryOt:p.secondary_ot||"",secondarySlp:p.secondary_slp||"",
  secondaryPtPhone:p.secondary_pt_phone||"",secondaryOtPhone:p.secondary_ot_phone||"",secondarySlpPhone:p.secondary_slp_phone||"",
  classification:p.classification||"ABM",highPriority:p.high_priority||false,isUrgent:p.is_urgent||false,
  priorityById:p.priority_by||null,priorityByName:p.priority_by_name||"",
  urgentById:p.urgent_by||null,urgentByName:p.urgent_by_name||"",
  ward:p.ward||"Ward A",checklist:{...DEF_CHK,...(p.checklist||{})},equipOthers:p.equip_others||"",
  physicianNotes:"",roundNotes:"",ptNotes:"",otNotes:"",slpNotes:"",
  physicianHistory:nm[p.id+"_physician"]||[],roundHistory:nm[p.id+"_round"]||[],
  ptHistory:nm[p.id+"_pt"]||[],otHistory:nm[p.id+"_ot"]||[],slpHistory:nm[p.id+"_slp"]||[],
});
const n2l=(n,replies)=>({id:n.id,text:n.text,ts:n.created_at,authorName:n.author_name||"",editedAt:n.edited_at,replies});
const r2l=r=>({id:r.id,text:r.text,ts:r.created_at,authorName:r.author_name||"",authorId:r.author_id||null});
function updL(id,changes){S.patients=S.patients.map(p=>p.id===id?{...p,...changes}:p);}

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
function render(){renderHdr();renderSidebar();renderMain();if(isMobile())mobTab(mobActiveTab);}

function renderHdr(){
  document.getElementById("hdr-date").textContent=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const ac=document.getElementById("arc-count");
  if(S.archive.length>0){ac.style.display="";ac.textContent=S.archive.length;}else ac.style.display="none";
}

function renderSidebar(){
  const q=S.search.toLowerCase();
  const filt=S.patients.filter(p=>{
    const n=(p.name||"").toLowerCase(),r=(p.room||"").toLowerCase(),m=(p.mrn||"").toLowerCase(),w=(p.ward||"").toLowerCase();
    return n.includes(q)||r.includes(q)||m.includes(q)||w.includes(q);
  });
  const urgC=filt.filter(p=>p.isUrgent).length;
  const hpC=filt.filter(p=>p.highPriority).length;
  const unstC=filt.filter(p=>p.checklist?.unstable).length;

  const buildRow=(p,showWard=false)=>{
    const isAct=p.id===S.selected;
    const done=Object.values(p.checklist).filter(Boolean).length;
    const acts=[
      canManagePatients() ? `<button class="re-btn" onclick="event.stopPropagation();openEditModal('${p.id}')">✏️</button>` : "",
      canManagePatients() ? `<button class="ra-btn" onclick="event.stopPropagation();openArcConfirm('${p.id}')">Archive</button>` : "",
      canDeletePatients() ? `<button class="rd-btn" onclick="event.stopPropagation();openDelConfirm('${p.id}')">🗑️</button>` : "",
      canWriteNotes() ? `<button class="rq-btn" onclick="event.stopPropagation();openQuickNote('${p.id}')">📝</button>` : "",
    ].join("");
    const wardTag=showWard?`<span class="${wbc(p.ward)}" style="font-size:10px;padding:1px 6px;border-radius:4px;margin-left:2px">${esc(p.ward||"Ward A")}</span>`:"";
    return `<div class="pat-row${isAct?" active":""}" onclick="mobSelPat('${p.id}')">
      <div class="row-top">
        <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
          <span class="row-room">${esc(p.room)}</span>
          ${wardTag}
          ${p.isUrgent?`<span title='Urgent${p.urgentByName?" — flagged by "+p.urgentByName:""}'>🔴</span>`:""}
          ${p.highPriority?`<span title='Priority${p.priorityByName?" — flagged by "+p.priorityByName:""}'>🚩</span>`:""}
          ${p.checklist.unstable?"<span title='Unstable'>⚠️</span>":""}
        </div>
        <span class="cls-badge cls-${p.classification}">${p.classification}</span>
      </div>
      <div class="row-name">${esc(maskName(p.name||"Room "+p.room))}</div>
      <div class="row-mrn">${esc(maskMRN(p.mrn))}</div>
      <div class="row-bot">
        <span class="row-pt">${esc(p.primaryPt||"")}</span>
        <span class="row-done${done>=2?" complete":""}">${done}/11</span>
      </div>
      ${acts?`<div class="row-acts">${acts}</div>`:""}
    </div>`;
  };
  const WARD_ORDER=WARDS.map(w=>w.id);
  const sortR=arr=>[...arr].sort((a,b)=>{
    const wA=WARD_ORDER.indexOf(a.ward||"Ward A"),wB=WARD_ORDER.indexOf(b.ward||"Ward A");
    if(wA!==wB)return wA-wB;
    const nA=parseInt(a.room)||0,nB=parseInt(b.room)||0;
    return nA!==nB?nA-nB:(a.room||"").localeCompare(b.room||"");
  });

  // Render patients grouped by ward with sub-headers — used inside flag groups
  const buildFlagGroup=patients=>{
    if(!patients.length)return"";
    const byWard={};
    patients.forEach(p=>{const w=p.ward||"Ward A";if(!byWard[w])byWard[w]=[];byWard[w].push(p);});
    return WARD_ORDER.filter(w=>byWard[w])
      .map(w=>{
        return `<div style="background:#f8f0f1;padding:4px 14px;font-size:10px;font-weight:700;color:#9b6670;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid #f0e4e6">
            <span class="${wbc(w)}" style="font-size:9px;padding:1px 6px;border-radius:4px;margin-right:4px">${esc(w)}</span>
          </div>`+byWard[w].map(p=>buildRow(p,false)).join("");
      }).join("");
  };

  let html="";
  const urgP=sortR(filt.filter(p=>p.isUrgent));
  if(urgP.length>0){const c=collapsed.has("__urg__");html+=`<div class="ward-section urg-section"><button class="ward-hdr urg-hdr" onclick="togWard('__urg__')"><span>🔴</span><span class="ward-name" style="color:#dc2626">Urgent</span><span class="ward-cnt" style="background:#fee2e2;color:#991b1b">${urgP.length}</span><span class="ward-chev">${c?"▶":"▼"}</span></button><div class="ward-pats${c?" collapsed":""}">${buildFlagGroup(urgP)}</div></div>`;}
  const priP=sortR(filt.filter(p=>p.highPriority));
  if(priP.length>0){const c=collapsed.has("__pri__");html+=`<div class="ward-section pri-section"><button class="ward-hdr pri-hdr" onclick="togWard('__pri__')"><span>🚩</span><span class="ward-name" style="color:#9b2335">Priority</span><span class="ward-cnt" style="background:#fad5d9;color:#7b1f2e">${priP.length}</span><span class="ward-chev">${c?"▶":"▼"}</span></button><div class="ward-pats${c?" collapsed":""}">${buildFlagGroup(priP)}</div></div>`;}
  const unstP=sortR(filt.filter(p=>p.checklist?.unstable));
  if(unstP.length>0){const c=collapsed.has("__unst__");html+=`<div class="ward-section unst-section"><button class="ward-hdr unst-hdr" onclick="togWard('__unst__')"><span>⚠️</span><span class="ward-name" style="color:#d97706">Unstable</span><span class="ward-cnt" style="background:#fef3c7;color:#92400e">${unstP.length}</span><span class="ward-chev">${c?"▶":"▼"}</span></button><div class="ward-pats${c?" collapsed":""}">${buildFlagGroup(unstP)}</div></div>`;}
  WARDS.forEach(w=>{
    const wp=sortR(filt.filter(p=>(p.ward||"Ward A")===w.id));
    const c=collapsed.has(w.id);
    const ac=S.patients.filter(p=>(p.ward||"Ward A")===w.id).length;
    html+=`<div class="ward-section"><button class="ward-hdr" onclick="togWard('${w.id}')"><span class="ward-dot ${w.dc}"></span><span class="ward-name">${w.label}</span><span class="ward-cnt">${ac}</span><span class="ward-chev">${c?"▶":"▼"}</span></button><div class="ward-pats${c?" collapsed":""}">
      ${wp.length===0?`<div class="empty-list" style="padding:10px 14px;font-size:11px">No patients${q?" matching":""}.</div>`:wp.map(buildRow).join("")}
    </div></div>`;
  });
  document.getElementById("patient-list").innerHTML=html||`<div class="empty-list">No patients found.</div>`;
  document.getElementById("sidebar-foot").textContent=`${filt.length} patient${filt.length!==1?"s":""} · ${urgC} urgent · ${hpC} priority · ${unstC} unstable`;
}

function rCk(p,key,lbl,icon,ac,ab,at){
  const ch=p.checklist[key];
  return `<button class="chk-btn" onclick="togChk('${p.id}','${key}')" style="${ch?`border-color:${ac};background:linear-gradient(135deg,${ab},#fff8f8)`:""}">
    <div class="chk-box" style="${ch?`background:${ac}`:""}"> ${ch?icon:""}</div>
    <div><div class="chk-lbl" style="${ch?`color:${at}`:""}"> ${lbl}</div>
    <div class="chk-sub" style="${ch?`color:${ac}`:""}"> ${ch?"Marked":"Tap to mark"}</div></div>
  </button>`;
}
function rEq(p,key,lbl,icon){
  const ch=p.checklist[key]||false;
  return `<button class="eq-btn${ch?" checked":""}" onclick="togChk('${p.id}','${key}')">
    <span class="eq-icon">${icon}</span><span class="eq-lbl">${lbl}</span>
    ${ch?'<span class="eq-chk">✓</span>':""}
  </button>`;
}

function rNS(p,type,icon,title,placeholder,replies){
  const dk=type+"Notes",hk=type+"History";
  const draft=p[dk]||"",hist=p[hk]||[],hasT=draft.trim().length>0;
  const today=new Date().toDateString();

  const renderNote=n=>{
    const el=n.editedAt?`<span class="etag">edited ${fmt(n.editedAt)}</span>`:"";
    const reps=n.replies||[];
    const rThread=reps.length===0?"":
      `<div class="reply-thread">${reps.map(r=>`<div class="reply-entry">
        <div class="reply-meta"><span>↩️</span><span class="reply-ts">Reply · ${fmt(r.ts)}</span>
        ${r.authorName?`<span class="reply-author">${esc(r.authorName)}</span>`:""}
        <button class="reply-del" onclick="delReply('${p.id}','${hk}','${n.id}','${r.id}')">✕ Remove</button></div>
        <div class="reply-text">${esc(r.text)}</div>
      </div>`).join("")}</div>`;
    const rInp=!replies?"":
      `<div class="reply-input" id="ri-${n.id}">
        <textarea class="reply-ta" id="rta-${n.id}" placeholder="Write a reply…"></textarea>
        <div class="reply-acts">
          <button class="reply-cancel" onclick="cancelReply('${n.id}')">Cancel</button>
          <button class="reply-post" onclick="postReply('${p.id}','${hk}','${n.id}')">Post Reply</button>
        </div>
      </div>`;
    return `<div class="note-entry" id="ne-${n.id}">
      <div class="note-entry-hdr">
        <span class="note-ts" onclick="togView('${n.id}')">🕐 ${fmt(n.ts)}${el}</span>
        ${n.authorName?`<span class="note-author">✍️ ${esc(n.authorName)}</span>`:""}
        <div class="note-acts">
          <button class="ne-btn ne-view" onclick="togView('${n.id}')" id="vbtn-${n.id}">▼ View</button>
          ${replies?`<button class="ne-btn ne-rep" onclick="openReply('${n.id}')">💬 Reply</button>`:""}
          <button class="ne-btn ne-edit" onclick="togEdit('${p.id}','${hk}','${n.id}')">✏️ Edit</button>
          <button class="ne-btn ne-del" onclick="promptDel('${p.id}','${hk}','${n.id}')">🗑 Delete</button>
        </div>
      </div>
      <div class="note-body" id="nb-${n.id}">${esc(n.text)}</div>
      ${rThread}${rInp}
      <div class="note-edit-area" id="ea-${n.id}">
        <textarea class="note-edit-ta" id="eta-${n.id}">${esc(n.text)}</textarea>
        <div class="note-edit-foot">
          <button class="ne-cancel" onclick="cancelEdit('${p.id}','${hk}','${n.id}')">Cancel</button>
          <button class="ne-save" onclick="commitEdit('${p.id}','${hk}','${n.id}')">Save Changes</button>
        </div>
      </div>
      <div class="del-confirm" id="dc-${n.id}">
        <span class="del-msg">⚠️ Delete this note permanently?</span>
        <div class="del-acts">
          <button class="dc-cancel" onclick="cancelDel('${n.id}')">Cancel</button>
          <button class="dc-confirm" onclick="commitDel('${p.id}','${hk}','${n.id}')">Delete</button>
        </div>
      </div>
    </div>`;
  };

  let hHTML="";
  if(hist.length>0){
    const sorted=[...hist].reverse();
    const todayNotes=sorted.filter(n=>new Date(n.ts).toDateString()===today);
    const prevNotes=sorted.filter(n=>new Date(n.ts).toDateString()!==today);
    const todayHTML=todayNotes.length?`
      <div class="note-day-group">
        <div class="note-day-lbl">📅 Today</div>
        ${todayNotes.map(renderNote).join("")}
      </div>`:"";
    const prevHTML=prevNotes.length?`
      <div class="note-day-group">
        <details class="prev-notes-details">
          <summary class="prev-notes-summary">🗂 Previous Entries (${prevNotes.length})</summary>
          ${prevNotes.map(renderNote).join("")}
        </details>
      </div>`:"";
    hHTML=`<div class="note-hist"><div class="note-hist-lbl">Saved Notes</div>${todayHTML}${prevHTML}</div>`;
  }

  return `<div class="note-card">
    <div class="note-hdr"><span>${icon}</span><span class="note-hdr-lbl">${title}</span>
      ${hist.length>0?`<span class="note-cnt">${hist.length} saved ${hist.length===1?"note":"notes"}</span>`:""}
      ${canWriteNotes()&&NOTE_TEMPLATES[type]?.length?`<button class="ne-btn ne-view" style="margin-left:auto" onclick="openTemplateMenu('${type}','${p.id}')">📋 Templates</button>`:""}
    </div>
    <div class="note-input-area">
      ${canWriteNotes()?`<textarea class="note-ta" placeholder="${placeholder}" oninput="onNI('${p.id}','${dk}',this)" id="nta-${type}-${p.id}">${esc(draft)}</textarea>
      <div class="note-save-row">
        <button class="note-save-btn${hasT?" active":""}" id="nsb-${type}-${p.id}" onclick="saveNote('${p.id}','${dk}','${hk}')">Save Note</button>
      </div>`:`<p style="padding:10px 0 12px;font-size:12px;color:var(--mu);font-style:italic">View only — your role cannot add notes.</p>`}
    </div>${hHTML}
  </div>`;
}

let qnPatientId=null;

function openQuickNote(pid){

  const panel=document.getElementById("quick-note-panel");if(!panel)return;
  renderQuickNote(p);

  setTimeout(()=>document.getElementById("qn-ta")?.focus(),50);
}

function closeQuickNote(){
  document.getElementById("quick-note-panel").style.display="none";

}

function renderQuickNote(p){

    {key:"physician",label:"🩺 Physician"},
    {key:"round",label:"📝 Round"},
    {key:"pt",label:"🦵 PT"},
    {key:"ot",label:"🖐️ OT"},
    {key:"slp",label:"🗣️ SLP"},
  ];
  const typeBtns=types.map(t=>`<button class="qn-type-btn${qnType===t.key?" active":""}" onclick="setQnType('${t.key}','${p.id}')">${t.label}</button>`).join("");

  document.getElementById("quick-note-panel").innerHTML=`
    <div class="qn-hdr">

    </div>

      <div class="qn-type-row">${typeBtns}</div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px">Templates</div>

function setQnType(type,pid){

function applyTemplate(type,idx){

async function saveQuickNote(){
  const ta=document.getElementById("qn-ta");if(!ta)return;

async function togChk(pid,key){
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  const nc={...p.checklist,[key]:!p.checklist[key]};
  updL(pid,{checklist:nc});
  if(key==="unstable"){
    if(nc.unstable){
      // Turned ON — expand
      collapsed.delete("__unst__");
    } else {
      // Turned OFF — collapse if no others remain
      const stillUnstable=S.patients.filter(x=>x.id!==pid).some(x=>x.checklist?.unstable);
      if(!stillUnstable)collapsed.add("__unst__");
    }
  }
  renderMain();renderSidebar();
  const {error}=await db.from("patients").update({checklist:nc,updated_at:new Date().toISOString()}).eq("id",pid);
  if(error){
    const rollback={...p.checklist};
    updL(pid,{checklist:rollback});renderMain();renderSidebar();
    toast("Failed to update checklist: "+error.message,"#dc2626");
  }
}

async function togFlag(pid,flag){
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  const isPriority=flag==="priority";
  const isFlagOn=isPriority?p.highPriority:p.isUrgent;
  const flagOwner=isPriority?p.priorityById:p.urgentById;
  const flagOwnerName=isPriority?p.priorityByName:p.urgentByName;
  const localFlag=isPriority?"highPriority":"isUrgent";
  const localById=isPriority?"priorityById":"urgentById";
  const localByName=isPriority?"priorityByName":"urgentByName";
  const dbFlag=isPriority?"high_priority":"is_urgent";
  const dbById=isPriority?"priority_by":"urgent_by";
  const dbByName=isPriority?"priority_by_name":"urgent_by_name";
  const groupKey=isPriority?"__pri__":"__urg__";
  const flagLabel=isPriority?"🚩 Priority":"🔴 Urgent";

  // Turning OFF — only the person who flagged (or admin) can remove it
  if(isFlagOn){
    const isOwner=flagOwner&&flagOwner===currentUser?.id;
    if(!isAdmin()&&!isOwner){
      const byWhom=flagOwnerName?`Only ${flagOwnerName} or an Admin`:"Only an Admin";
      toast(`${byWhom} can remove the ${flagLabel} flag.`,"#dc2626");
      return;
    }
  }

  const newVal=!isFlagOn;
  const updates={[localFlag]:newVal};
  if(newVal){
    // Turning ON — record who flagged
    updates[localById]=currentUser?.id||null;
    updates[localByName]=currentName||"";
  }else{
    // Turning OFF — clear the owner
    updates[localById]=null;
    updates[localByName]="";
  }

  updL(pid,updates);
  if(newVal){collapsed.delete(groupKey);}
  else{
    const stillInGroup=S.patients.filter(x=>x.id!==pid).some(x=>isPriority?x.highPriority:x.isUrgent);
    if(!stillInGroup)collapsed.add(groupKey);
  }
  renderMain();renderSidebar();

  const dbUpdates={[dbFlag]:newVal,[dbById]:newVal?(currentUser?.id||null):null,[dbByName]:newVal?(currentName||""):"",updated_at:new Date().toISOString()};
  const {error}=await db.from("patients").update(dbUpdates).eq("id",pid);
  if(error){
    // Roll back
    const rollback={[localFlag]:isFlagOn,[localById]:flagOwner,[localByName]:flagOwnerName};
    updL(pid,rollback);renderMain();renderSidebar();
    toast("Failed to update flag: "+error.message,"#dc2626");
  }
}

async function saveNote(pid,draftF,histF){
  const p=S.patients.find(x=>x.id===pid);if(!p||!p[draftF]?.trim())return;
  loader("Saving note…");
  const type=draftF.replace("Notes","");
  const {data:nd,error}=await db.from("notes").insert({patient_id:pid,note_type:type,text:p[draftF].trim(),author_name:currentName,author_id:currentUser?.id}).select().single();
  noloader();if(error){toast("Failed to save note.","#dc2626");return;}
  const saved=n2l(nd,[]);
  const changes={[histF]:[...(p[histF]||[]),saved],[draftF]:""};
  let flagRemoved=false;
  const tracked=["physicianHistory","roundHistory","ptHistory","otHistory","slpHistory"];
  if(tracked.includes(histF)){
    const removedFlags=[];
    if(p.highPriority){
      changes.highPriority=false;changes.priorityById=null;changes.priorityByName="";
      await db.from("patients").update({high_priority:false,priority_by:null,priority_by_name:"",updated_at:new Date().toISOString()}).eq("id",pid);
      removedFlags.push("🚩 Priority");
      const stillPri=S.patients.filter(x=>x.id!==pid).some(x=>x.highPriority);
      if(!stillPri)collapsed.add("__pri__");
    }
    if(p.isUrgent){
      changes.isUrgent=false;changes.urgentById=null;changes.urgentByName="";
      await db.from("patients").update({is_urgent:false,urgent_by:null,urgent_by_name:"",updated_at:new Date().toISOString()}).eq("id",pid);
      removedFlags.push("🔴 Urgent");
      const stillUrg=S.patients.filter(x=>x.id!==pid).some(x=>x.isUrgent);
      if(!stillUrg)collapsed.add("__urg__");
    }
    if(removedFlags.length>0){flagRemoved=true;toast(`${removedFlags.join(" & ")} flag${removedFlags.length>1?"s":""} removed — note saved.`,"#9b2335");}
  }
  updL(pid,changes);renderMain();renderSidebar();
  if(!flagRemoved)toast("Note saved ✓","#16a34a");

  // Rule 1: Notify assigned therapists for ALL note types
  sendTherapistNotifications(p,type,nd.text||"");
}

async function sendTherapistNotifications(p,noteType,noteText){
  const NOTE_LABELS={physician:"Physician Orders",round:"Round Notes",pt:"PT Notes",ot:"OT Notes",slp:"SLP Notes"};
  const NOTE_LABEL=NOTE_LABELS[noteType]||noteType;
  const therapistNames=[p.primaryPt,p.secondaryPt,p.primaryOt,p.secondaryOt,p.primarySlp,p.secondarySlp].filter(Boolean);
  if(!therapistNames.length)return;
  const {data:userRows}=await db.from("user_roles").select("user_id,full_name").in("full_name",therapistNames);
  if(!userRows||!userRows.length)return;
  const notifRows=userRows
    .filter(u=>u.user_id!==currentUser?.id)
    .map(u=>({for_user_id:u.user_id,patient_id:p.id,note_type:NOTE_LABEL,note_text:noteText,author_name:currentName,is_read:false}));
  if(!notifRows.length)return;
  await db.from("notifications").insert(notifRows);
}

async function postReply(pid,hk,nid){
  const ta=document.getElementById("rta-"+nid);if(!ta)return;
  const t=ta.value.trim();if(!t){toast("Reply cannot be empty.","#dc2626");return;}
  loader("Posting reply…");
  const {data,error}=await db.from("replies").insert({note_id:nid,text:t,author_name:currentName,author_id:currentUser?.id}).select().single();
  noloader();if(error){toast("Failed to post reply.","#dc2626");return;}
  const rep=r2l(data);
  const p=S.patients.find(x=>x.id===pid);if(!p)return;
  updL(pid,{[hk]:(p[hk]||[]).map(n=>n.id===nid?{...n,replies:[...(n.replies||[]),rep]}:n)});

  // Remove priority/urgent flags on reply
  const changes={};const removedFlags=[];
  if(p.highPriority){
    changes.highPriority=false;changes.priorityById=null;changes.priorityByName="";
    await db.from("patients").update({high_priority:false,priority_by:null,priority_by_name:"",updated_at:new Date().toISOString()}).eq("id",pid);
    removedFlags.push("🚩 Priority");
    const stillPri=S.patients.filter(x=>x.id!==pid).some(x=>x.highPriority);
    if(!stillPri)collapsed.add("__pri__");
  }
  if(p.isUrgent){
    changes.isUrgent=false;changes.urgentById=null;changes.urgentByName="";
    await db.from("patients").update({is_urgent:false,urgent_by:null,urgent_by_name:"",updated_at:new Date().toISOString()}).eq("id",pid);
    removedFlags.push("🔴 Urgent");
    const stillUrg=S.patients.filter(x=>x.id!==pid).some(x=>x.isUrgent);
    if(!stillUrg)collapsed.add("__urg__");
  }
  if(Object.keys(changes).length)updL(pid,changes);

  renderMain();renderSidebar();
  if(removedFlags.length>0){
    toast(`↩️ Reply posted — ${removedFlags.join(" & ")} flag${removedFlags.length>1?"s":""} removed.`,"#9b2335");
  }else{
    toast("Reply posted ✓","#16a34a");
  }

  // Notify assigned therapists about the reply
  sendTherapistNotifications(p,hk.replace("History",""),`↩️ Reply: ${t}`);
}

function patForm(p){
  const ie=!!p,v=p||{room:"",name:"",mrn:"",primaryPt:"",primaryOt:"",primarySlp:"",ptPhone:"",otPhone:"",slpPhone:"",secondaryPt:"",secondaryOt:"",secondarySlp:"",secondaryPtPhone:"",secondaryOtPhone:"",secondarySlpPhone:"",classification:"ABM",highPriority:false,isUrgent:false,ward:"Ward A"};

  const wOpts=WARDS.map(w=>`<option value="${w.id}"${w.id===(v.ward||"Ward A")?" selected":""}>${w.label}</option>`).join("");
  const canAssign=canManagePatients();
  const therapistOpts=(disc,cur)=>{
    const members=staffDir.filter(s=>s.discipline===disc);
    const blankOpt=`<option value="">— Select ${disc} —</option>`;
    const opts=members.map(s=>`<option value="${esc(s.fullName)}"${s.fullName===cur?" selected":""}>${esc(s.fullName)}</option>`).join("");
    const inDir=members.some(s=>s.fullName===cur);
    const manualOpt=cur&&!inDir?`<option value="${esc(cur)}" selected>${esc(cur)} (manual)</option>`:"";
    return blankOpt+opts+manualOpt;
  };
  const therapistField=(disc,fieldId,phoneId,cur,phone,label='Primary')=>{
    if(canAssign){
      return `<div class="g2">
        <div><label class="fl">${label} ${disc}</label>
          <select class="fi" id="${fieldId}" onchange="onTherapistChange('${fieldId}')"><${therapistOpts(disc,cur)}</select>
        </div>
        <div><label class="fl">${label} ${disc} WhatsApp</label><input class="fi" id="${phoneId}" value="${esc(phone||"")}" placeholder="Auto-filled from directory"/></div>
      </div>`;
    }else{
      return `<div class="g2">

function buildWALink(p,role,name,phone){
  const patLabel=p.name||"Room "+p.room;
  const ward=p.ward||"Ward A";
  const note=p.equipOthers?`\n📋 Note: ${p.equipOthers}`:"";
  const msg=`🚨 *URGENT PATIENT ALERT*\n\nDear ${name||role},\n\nPatient *${patLabel}* (Room ${p.room}, ${ward}) has been flagged as *URGENT*.\n\nMRN: ${p.mrn||"—"}${note}\n\nPlease attend to this patient as soon as possible.\n\n— Salma Rahba Rehabilitation Medicine Rounding System`;
  const clean=phone.replace(/\D/g,"");
  return `https://wa.me/${clean}?text=${encodeURIComponent(msg)}`;
}
function onTherapistChange(fieldId){
  const nameEl=document.getElementById(fieldId);

}

async function subPat(eid){
  const room=document.getElementById("fr").value.trim(),mrn=document.getElementById("fm").value.trim(),name=document.getElementById("fn").value.trim();
  // Only Admin/Admin Officer can assign therapists
  const existingPat=S.patients.find(x=>x.id===(eid==="null"?null:eid));
  const primaryPt=canManagePatients()?document.getElementById("fpt").value.trim():(existingPat?.primaryPt||"");
  const primaryOt=canManagePatients()?document.getElementById("fot").value.trim():(existingPat?.primaryOt||"");
  const primarySlp=canManagePatients()?document.getElementById("fslp").value.trim():(existingPat?.primarySlp||"");
  const ptPhone=canManagePatients()?document.getElementById("fptph").value.trim():(existingPat?.ptPhone||"");
  const otPhone=canManagePatients()?document.getElementById("fotph").value.trim():(existingPat?.otPhone||"");
  const slpPhone=canManagePatients()?document.getElementById("fslpph").value.trim():(existingPat?.slpPhone||"");
  const secondaryPt=canManagePatients()?document.getElementById("fspt").value.trim():(existingPat?.secondaryPt||"");
  const secondaryOt=canManagePatients()?document.getElementById("fsot").value.trim():(existingPat?.secondaryOt||"");
  const secondarySlp=canManagePatients()?document.getElementById("fsslp").value.trim():(existingPat?.secondarySlp||"");
  const secondaryPtPhone=canManagePatients()?document.getElementById("fsptph").value.trim():(existingPat?.secondaryPtPhone||"");
  const secondaryOtPhone=canManagePatients()?document.getElementById("fsotph").value.trim():(existingPat?.secondaryOtPhone||"");
  const secondarySlpPhone=canManagePatients()?document.getElementById("fsslpph").value.trim():(existingPat?.secondarySlpPhone||"");
  const cls=document.getElementById("fc").value,ward=document.getElementById("fw").value;
  const hp=document.getElementById("fp").value==="1",isUrgent=document.getElementById("fu").value==="1";
  if(!room){toast("Room number is required.","#dc2626");return;}
  const editId=(eid===null||eid==="null")?null:eid;
  loader(editId?"Saving…":"Adding…");
  if(editId){
    const {error}=await db.from("patients").update({
      room,mrn,name,primary_pt:primaryPt,primary_ot:primaryOt,primary_slp:primarySlp,
      pt_phone:ptPhone,ot_phone:otPhone,slp_phone:slpPhone,
      secondary_pt:secondaryPt,secondary_ot:secondaryOt,secondary_slp:secondarySlp,
      secondary_pt_phone:secondaryPtPhone,secondary_ot_phone:secondaryOtPhone,secondary_slp_phone:secondarySlpPhone,
      classification:cls,high_priority:hp,is_urgent:isUrgent,ward,
      priority_by:hp?null:null, // always reset — owner tracked via togFlag, not form
      priority_by_name:hp?"":"",
      urgent_by:null,
      urgent_by_name:"",
      updated_at:new Date().toISOString()
    }).eq("id",editId);
    noloader();if(error){toast("Failed: "+error.message,"#dc2626");return;}
    updL(editId,{room,mrn,name,primaryPt,primaryOt,primarySlp,ptPhone,otPhone,slpPhone,secondaryPt,secondaryOt,secondarySlp,secondaryPtPhone,secondaryOtPhone,secondarySlpPhone,classification:cls,highPriority:hp,isUrgent,ward});
    closeModal();render();toast("Patient updated ✓","#16a34a");
  }else{
    const {data,error}=await db.from("patients").insert({room,mrn,name,primary_pt:primaryPt,primary_ot:primaryOt,primary_slp:primarySlp,pt_phone:ptPhone,ot_phone:otPhone,slp_phone:slpPhone,secondary_pt:secondaryPt,secondary_ot:secondaryOt,secondary_slp:secondarySlp,secondary_pt_phone:secondaryPtPhone,secondary_ot_phone:secondaryOtPhone,secondary_slp_phone:secondarySlpPhone,classification:cls,high_priority:hp,is_urgent:isUrgent,ward,checklist:DEF_CHK,equip_others:""}).select().single();
    noloader();if(error){toast("Failed: "+error.message,"#dc2626");return;}
    S.patients.push(p2l(data,{}));S.selected=data.id;
    expandPatientGroup(data.id);
    closeModal();render();toast("Patient added ✓","#16a34a");
  }
}

function openArcConfirm(id){

  const label=p.name||"Room "+p.room;

async function arcPat(id){
  const p=S.patients.find(x=>x.id===id);if(!p)return;
  loader("Archiving…");
  const {error}=await db.from("patients").update({is_archived:true,archived_at:new Date().toISOString()}).eq("id",id);
  noloader();
  if(error){toast("Failed to archive: "+error.message,"#dc2626");return;}
  S.archive.push({...p,archivedAt:new Date().toISOString()});
  S.patients=S.patients.filter(x=>x.id!==id);
  S.selected=S.patients.length?S.patients[0].id:null;
  closeModal();render();toast(`${p.name||"Room "+p.room} archived.`,"#7c3aed");
}

function openDelConfirm(id){
  if(!canDeletePatients()){toast("Only admins can permanently delete patients.","#dc2626");return;}
  const p=S.patients.find(x=>x.id===id);if(!p)return;
  const label=p.name||"Room "+p.room;
  showModal(`<div class="confirm-box"><div class="conf-icon">🗑️</div><div class="conf-title">Delete Patient?</div><div class="conf-msg"><strong>${esc(label)}</strong> will be <strong>permanently deleted</strong>.</div><div class="conf-sub">Cannot be undone. All notes and history will be lost.</div><div class="modal-acts" style="width:100%"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-danger" onclick="permDel('${id}')">Delete Permanently</button></div></div>`);
}
async function permDel(id){
  const p=S.patients.find(x=>x.id===id);if(!p)return;
  loader("Deleting…");
  const {error}=await db.from("patients").delete().eq("id",id);
  noloader();
  if(error){toast("Failed to delete: "+error.message,"#dc2626");return;}
  S.patients=S.patients.filter(x=>x.id!==id);
  if(S.selected===id)S.selected=S.patients.length?S.patients[0].id:null;
  closeModal();render();toast(`${p.name||"Room "+p.room} permanently deleted.`,"#dc2626");
}

function renderArcModal(q){
  const res=S.archive.filter(p=>(p.name||"").toLowerCase().includes(q.toLowerCase())||(p.mrn||"").toLowerCase().includes(q.toLowerCase()));

async function restorePat(id){
  if(!canManagePatients()){toast("You don't have permission to restore patients.","#dc2626");return;}
  loader("Restoring…");
  const {error}=await db.from("patients").update({is_archived:false,archived_at:null}).eq("id",id);
  noloader();
  if(error){toast("Failed to restore: "+error.message,"#dc2626");return;}
  const p=S.archive.find(x=>x.id===id);if(!p)return;
  const {archivedAt,...patient}=p;
  S.patients.push(patient);S.archive=S.archive.filter(x=>x.id!==id);
  S.selected=patient.id;
  expandPatientGroup(patient.id);
  closeModal();render();toast(`${patient.name||"Room "+patient.room} restored ✓`,"#16a34a");
}

const ROLE_LABELS={"pending":"⏳ Pending","user":"👤 User","admin_officer":"🔷 Admin Officer","admin":"👑 Admin"};
const ROLE_PILLS={"pending":"rp-pending","user":"rp-user","admin_officer":"rp-admin_officer","admin":"rp-admin"};

async function openAdminPanel(tab){
  tab=tab||"users";
  if(!isAdmin()){toast("Admin access only.","#dc2626");return;}
  loader("Loading…");
  const [ur,sr]=await Promise.all([
    db.from("user_roles").select("*").order("created_at"),
    db.from("user_roles").select("user_id,full_name,discipline,phone").neq("role","pending").order("full_name"),
  ]);
  noloader();
  if(ur.error){toast("Failed to load: "+ur.error.message,"#dc2626");return;}

  const all=(ur.data||[]).slice().sort((a,b)=>{const o={pending:0,user:1,admin_officer:2,admin:3};return (o[a.role]??9)-(o[b.role]??9);});
  const pending=all.filter(u=>u.role==="pending");
  const fmtDate=iso=>{if(!iso)return"—";return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};
  const pendingBanner=pending.length>0?`<div class="pending-banner">⏳ <strong>${pending.length} user${pending.length!==1?"s":""} waiting for approval</strong></div>`:"";
  const userRows=all.map(u=>{
    const isMe=u.user_id===currentUser?.id,role=u.role||"pending";
    const pill=`<span class="role-pill ${ROLE_PILLS[role]||"rp-pending"}">${ROLE_LABELS[role]||role}</span>`;
    const phoneDisplay=u.phone?`<div style="font-size:11px;color:var(--mu);margin-top:2px">📱 ${esc(u.phone)}</div>`:`<div style="font-size:11px;color:#ccc;margin-top:2px">No mobile</div>`;
    let actions="";
    if(isMe){actions=`<span style="font-size:11px;color:var(--mu);font-style:italic">You</span>`;}
    else if(role==="pending"){actions=`<button class="ua-btn ua-approve" onclick="changeRole('${u.user_id}','user')">✅ Approve</button><button class="ua-btn ua-reject" onclick="rejectUser('${u.user_id}','${esc(u.full_name||"this user")}')">✕ Reject</button>`;}
    else if(role==="user"){actions=`<button class="ua-btn ua-promote" onclick="changeRole('${u.user_id}','admin_officer')">→ Admin Officer</button><button class="ua-btn ua-promote" style="border-color:#f59e0b;background:#fffbeb;color:#92400e" onclick="changeRole('${u.user_id}','admin')">→ Admin</button>`;}
    else if(role==="admin_officer"){actions=`<button class="ua-btn ua-promote" style="border-color:#f59e0b;background:#fffbeb;color:#92400e" onclick="changeRole('${u.user_id}','admin')">→ Admin</button><button class="ua-btn ua-demote" onclick="changeRole('${u.user_id}','user')">→ User</button>`;}
    else if(role==="admin"){actions=`<button class="ua-btn ua-demote" onclick="changeRole('${u.user_id}','admin_officer')">→ Admin Officer</button><button class="ua-btn ua-demote" onclick="changeRole('${u.user_id}','user')">→ User</button>`;}
    return `<tr><td><strong>${esc(u.full_name||"—")}</strong>${isMe?' <span style="font-size:10px;color:var(--mu)">(you)</span>':""}${phoneDisplay}</td><td>${pill}</td><td style="font-size:11px;color:var(--fa)">${fmtDate(u.created_at)}</td><td><div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px">${actions}</div><button class="ua-btn" style="border-color:#93c5fd;background:#eff6ff;color:#1d4ed8;width:100%;text-align:center" onclick="editUserPhone('${u.user_id}','${esc(u.phone||"")}','${esc(u.full_name||"")}')">📱 Edit Mobile</button></td></tr>`;
  }).join("");
  const DISCS=["PT","OT","SLP","Physician","Other"];
  const eligible=all.filter(u=>u.role!=="pending"&&u.full_name);
  const staffRows=eligible.map(u=>{
    const disc=u.discipline||"";

  }).join("");
  const ts=(t)=>t===tab?"padding:10px 22px;border:none;border-bottom:3px solid #9b2335;background:transparent;font-weight:700;color:#7b1f2e;font-size:13px;cursor:pointer;":"padding:10px 22px;border:none;border-bottom:3px solid transparent;background:transparent;font-weight:600;color:#9b6670;font-size:13px;cursor:pointer;";
  showModal(`
    <div class="modal-head"><span class="modal-title">👑 Admin Panel</span><button class="modal-close" onclick="closeModal()">×</button></div>

    <div style="overflow:auto;max-height:55vh;"><table class="user-table"><thead><tr><th>Name & Mobile</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead><tbody>${userRows||`<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--fa)">No users found.</td></tr>`}</tbody></table></div>
    `:`
    <div style="padding:10px 20px;background:#fdf0f1;border-bottom:1px solid #f5d5d8;font-size:12px;color:#9b2335;">Assign disciplines to staff. When assigned to a patient, their mobile auto-fills.</div>

    `}
  `,false,true);
}
